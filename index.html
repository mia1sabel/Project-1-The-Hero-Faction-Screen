<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Through The Feminine Gaze: A Cinematic Mood Board</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..900;1,6..96,400..900&family=Anton&family=Space+Mono&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100vh; overflow: hidden; background-color: #F5F5DC; }

        /* Film Grain & Overlays */
        body::before {
            content: ""; position: fixed; inset: 0;
            background-image: url("https://www.transparenttextures.com/patterns/stardust.png");
            opacity: 0.3; z-index: 1000; pointer-events: none; mix-blend-mode: multiply;
        }
        body::after {
            content: ""; position: fixed; inset: 0;
            box-shadow: inset 0 0 150px rgba(0,0,0,0.6);
            z-index: 999; pointer-events: none;
        }

        .letterbox {
            position: fixed; left: 0; right: 0; height: 8vh;
            background-color: #050505; z-index: 1050;
            transition: height 0.8s cubic-bezier(0.85, 0, 0.15, 1);
            pointer-events: none;
        }
        .letterbox.top { top: 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .letterbox.bottom { bottom: 0; border-top: 1px solid rgba(255,255,255,0.1); }
        .is-active .letterbox { height: 0; }

        header {
            position: fixed; top: 25px; left: 25px; z-index: 1100;
            transition: opacity 0.5s ease;
        }
        header h1 {
            font-family: 'Bodoni Moda', serif; font-size: 0.8rem;
            text-transform: uppercase; letter-spacing: 0.4rem; color: #666;
        }
        .is-active header { opacity: 0; } 

        main {
            display: grid; grid-template-columns: 1fr 1fr 1fr;
            height: 100vh; width: 100vw;
            transition: grid-template-columns 0.9s cubic-bezier(0.85, 0, 0.15, 1);
        }

        main.act-1-active { grid-template-columns: 2.5fr 0.25fr 0.25fr; }
        main.act-2-active { grid-template-columns: 0.25fr 2.5fr 0.25fr; }
        main.act-3-active { grid-template-columns: 0.25fr 0.25fr 2.5fr; }

        section.act {
            position: relative; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            transition: all 0.7s ease; overflow: hidden;
            border-right: 1px solid rgba(0,0,0,0.1); padding: 40px;
        }

        .act h2 {
            font-family: 'Bodoni Moda', serif; font-size: 1.5rem;
            text-transform: uppercase; color: #111; letter-spacing: 0.2rem;
            transition: all 0.6s ease; text-align: center; z-index: 50;
        }
        .act h2 .subtitle {
            font-family: 'Space Mono', monospace; font-size: 0.7rem;
            display: block; margin-top: 10px; opacity: 0.6;
        }

        .floating-asset {
            position: absolute; opacity: 0; pointer-events: none;
            transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            z-index: 10;
        }
        .active .floating-asset { opacity: 1; }

        @keyframes floatSlow { 0%, 100% { transform: translateY(0) rotate(0); } 50% { transform: translateY(-20px) rotate(3deg); } }
        @keyframes jitter { 0% { transform: translate(0,0); } 10% { transform: translate(-2px, 2px); } 20% { transform: translate(2px, -2px); } }

        /* ACT I */
        .act-1.active { background-color: #f2e9e4; }
        .act-1 .asset-1 { top: 10%; left: 10%; width: 20%; animation: floatSlow 5s infinite ease-in-out; }
        .act-1 .asset-2 { bottom: 10%; right: 10%; width: 35%; }
        .act-1 .asset-3 { top: 15%; right: 15%; width: 25%; }
        .act-1 .asset-4 { bottom: 20%; left: 15%; width: 18%; }
        .act-1 .asset-5 { top: 50%; left: 5%; width: 12%; }
        .act-1 .asset-6 { top: 5%; left: 40%; width: 20%; }
        .act-1 .asset-7 { bottom: 5%; left: 40%; width: 22%; }

        /* ACT II */
        .act-2.active { background-color: #D6006D; }
        .act-2 .asset-1 { top: 10%; left: 5%; width: 15%; animation: jitter 0.3s infinite; }
        .act-2 .asset-2 { top: 20%; right: 5%; width: 18%; }
        .act-2 .asset-3 { bottom: 15%; left: 10%; width: 22%; }
        .act-2 .asset-4 { bottom: 10%; right: 10%; width: 20%; }
        .act-2 .asset-5 { top: 5%; left: 30%; width: 15%; }
        .act-2 .asset-6, .act-2 .asset-7 { mix-blend-mode: screen; width: 35%; }
        .act-2 .asset-6 { bottom: 20%; left: 5%; }
        .act-2 .asset-7 { top: 30%; right: 5%; }

        /* ACT III */
        .act-3.active { background-color: #d4a373; }
        .act-3 .asset-1 { top: 10%; right: 10%; width: 28%; }
        .act-3 .asset-2 { bottom: 10%; left: 10%; width: 22%; box-shadow: 10px 10px 20px rgba(0,0,0,0.2); }
        .act-3 .asset-3 { top: 15%; left: 10%; width: 15%; }
        .act-3 .asset-4 { bottom: 20%; right: 15%; width: 18%; }
        .act-3 .asset-5 { top: 5%; left: 35%; width: 20%; }
        .act-3 .asset-6 { bottom: 5%; right: 35%; width: 14%; }

        .act-content { z-index: 60; pointer-events: none; }

        main.act-1-active .act-2, main.act-1-active .act-3,
        main.act-2-active .act-1, main.act-2-active .act-3,
        main.act-3-active .act-1, main.act-3-active .act-2 {
            filter: blur(15px) grayscale(1); opacity: 0.2;
        }

        @media (max-width: 768px) { main { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="letterbox top"></div>
    <div class="letterbox bottom"></div>

    <header><h1>Through The Feminine Gaze: A Cinematic Mood Board</h1></header>

    <main>
        <section class="act act-1">
            <img src="ribbon.png" class="floating-asset asset-1" alt="Ribbon">
            <img src="lace.png" class="floating-asset asset-2" alt="Lace">
            <img src="pearls.png" class="floating-asset asset-3" alt="Pearls">
            <img src="flower1.jpg" class="floating-asset asset-4" alt="Flower 1">
            <img src="flower2.jpg" class="floating-asset asset-5" alt="Flower 2">
            <img src="letter1.png" class="floating-asset asset-6" alt="Letter 1">
            <img src="letter2.png" class="floating-asset asset-7" alt="Letter 2">
            <div class="act-content">
                <h2>Act I: <span class="subtitle">Soft Focus, Heavy Hearts</span></h2>
            </div>
        </section>

        <section class="act act-2">
            <img src="candy1.webp" class="floating-asset asset-1" alt="Lollipop">
            <img src="candy2.png" class="floating-asset asset-2" alt="Candy">
            <img src="gun.png" class="floating-asset asset-3" alt="Gun">
            <img src="kiss.png" class="floating-asset asset-4" alt="Kiss">
            <img src="pills.webp" class="floating-asset asset-5" alt="Pills">
            <img src="shards.jpg" class="floating-asset asset-6" alt="Shards">
            <img src="sparkles.jpg" class="floating-asset asset-7" alt="Sparkles">
            <div class="act-content">
                <h2>Act II: <span class="subtitle">Glitter in the Dark</span></h2>
            </div>
        </section>

        <section class="act act-3">
            <img src="motel.jpg" class="floating-asset asset-1" alt="Motel">
            <img src="polaroid.jpg" class="floating-asset asset-2" alt="Polaroid">
            <img src="icecream.png" class="floating-asset asset-3" alt="Ice Cream">
            <img src="Dandelion.png" class="floating-asset asset-4" alt="Dandelion">
            <img src="receipt.jpg" class="floating-asset asset-5" alt="Receipt">
            <img src="sticker.webp" class="floating-asset asset-6" alt="Sticker">
            <div class="act-content">
                <h2>Act III: <span class="subtitle">Asphalt Shimmer, Diesel Dust</span></h2>
            </div>
        </section>
    </main>

    <script>
        const main = document.querySelector('main');
        const acts = document.querySelectorAll('.act');
        const body = document.body;
        
        acts.forEach((act, index) => {
            act.addEventListener('mouseenter', () => {
                acts.forEach(a => a.classList.remove('active'));
                main.className = `act-${index + 1}-active`;
                act.classList.add('active');
                body.classList.add('is-active'); 
            });
        });

        main.addEventListener('mouseleave', () => {
            acts.forEach(a => a.classList.remove('active'));
            main.className = '';
            body.classList.remove('is-active'); 
        });
    </script>
</body>
</html>

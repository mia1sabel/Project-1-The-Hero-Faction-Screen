<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Through The Feminine Gaze: The Hero Faction</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..900;1,6..96,400..900&family=Impact&display=swap" rel="stylesheet">
    
    <style>
        /* ==========================================================================
           GLOBAL INTERFACE & LAYOUT
           ========================================================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background-color: #F5F5DC;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        /* Asymmetrical 3-Column Grid */
        main {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            height: 100vh;
            width: 100vw;
            transition: grid-template-columns 0.4s ease-in-out;
        }

        main.act-1-active { grid-template-columns: 2fr 0.5fr 0.5fr; }
        main.act-2-active { grid-template-columns: 0.5fr 2fr 0.5fr; }
        main.act-3-active { grid-template-columns: 0.5fr 0.5fr 2fr; }

        /* ==========================================================================
           ACT BASE STYLING
           ========================================================================== */
        section.act {
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            cursor: pointer;
            transition: background-color 0.4s ease-in-out;
        }

        /* Collage Layer (::after) - 4-cell patchwork grid */
        .act::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease-in-out, filter 0.4s ease-in-out;
            mix-blend-mode: overlay;
        }

        /* Content stays sharp and on top */
        .act-content {
            position: relative;
            z-index: 2;
            text-align: center;
            max-width: 85%;
            filter: none;
        }

        .act-content h2 {
            margin-bottom: 0.5rem;
            transition: text-shadow 0.4s ease-in-out, color 0.4s ease-in-out;
        }

        .act-content p {
            font-size: 0.95rem;
            opacity: 0.8;
            line-height: 1.5;
        }

        /* ==========================================================================
           ACT I: SOFT FOCUS (Marie Antoinette / Virgin Suicides)
           Base: Versailles Blue #C3D7E8
           Collage: Toile, Stripes, Polka Dots, Lace
           Filter: Bloom (brightness 1.1, blur 0.8px)
           ========================================================================== */
        .act-1 {
            background-color: #F5F5DC;
        }

        .act-1 .act-content h2 {
            font-family: 'Bodoni Moda', serif;
            font-size: 3.5rem;
            font-weight: 700;
            letter-spacing: 1.2rem;
            text-transform: uppercase;
            color: #333;
        }

        .act-1 .act-content p {
            font-family: 'Bodoni Moda', serif;
            font-style: italic;
            color: #666;
        }

        /* Act I Collage: 4-cell patchwork */
        .act-1::after {
            background: 
                /* Cell 1 (top-left): Delicate pink floral Toile */
                linear-gradient(135deg, #C3D7E8 0%, #E8D7D7 100%),
                radial-gradient(circle at 20% 30%, rgba(255, 200, 220, 0.4) 5%, transparent 15%),
                radial-gradient(circle at 60% 70%, rgba(255, 200, 220, 0.3) 4%, transparent 12%),
                repeating-linear-gradient(45deg, transparent, transparent 8px, rgba(255, 192, 203, 0.2) 8px, rgba(255, 192, 203, 0.2) 16px);
            background-size: 50% 50%, 50% 50%, 50% 50%, 50% 50%;
            background-position: 0% 0%, 0% 0%, 0% 0%, 0% 0%;
        }

        .act-1.active {
            background-color: #C3D7E8;
        }

        .act-1.active::after {
            opacity: 1;
            background: 
                /* Cell 1: Delicate pink floral Toile */
                radial-gradient(circle at 15% 20%, rgba(255, 200, 220, 0.5) 3%, transparent 10%),
                radial-gradient(circle at 35% 35%, rgba(255, 200, 220, 0.4) 2%, transparent 8%),
                repeating-linear-gradient(45deg, transparent, transparent 6px, rgba(255, 192, 203, 0.25) 6px, rgba(255, 192, 203, 0.25) 12px),
                /* Cell 2: Vertical cream/pink stripes */
                repeating-linear-gradient(90deg, #F5F5DC 0%, #F5F5DC 20%, rgba(255, 200, 220, 0.3) 20%, rgba(255, 200, 220, 0.3) 40%),
                /* Cell 3: Dainty polka dots */
                radial-gradient(circle, rgba(255, 200, 220, 0.4) 2px, transparent 2px),
                /* Cell 4: Antique lace */
                repeating-linear-gradient(0deg, transparent, transparent 4px, rgba(200, 200, 200, 0.2) 4px, rgba(200, 200, 200, 0.2) 8px),
                repeating-linear-gradient(90deg, transparent, transparent 4px, rgba(200, 200, 200, 0.2) 4px, rgba(200, 200, 200, 0.2) 8px);
            background-size: 50% 50%, 50% 50%, 25px 25px, 50% 50%, 12px 12px, 12px 12px;
            background-position: 0% 0%, 50% 0%, 0% 50%, 50% 50%, 0% 50%, 0% 50%;
            filter: brightness(1.1) blur(0.8px);
        }

        .act-1.active .act-content h2 {
            color: #1a3a52;
        }

        /* ==========================================================================
           ACT II: GLITTER IN THE DARK (Spring Breakers / Euphoria)
           Base: Acid Pink #FF007F
           Collage: Neon circles, Checkerboard, Paisley, Rings
           Performance: Chromatic aberration + neon glow
           ========================================================================== */
        .act-2 {
            background-color: #F5F5DC;
        }

        .act-2 .act-content h2 {
            font-family: 'Impact', sans-serif;
            font-weight: 900;
            font-size: 5rem;
            text-transform: uppercase;
            letter-spacing: -0.02em;
            color: #111;
        }

        .act-2 .act-content p {
            font-family: 'Impact', sans-serif;
            font-weight: bold;
            color: #333;
        }

        /* Act II Collage: Chaotic 2000s grid */
        .act-2::after {
            background: 
                /* Cell 1: Neon green/pink concentric circles */
                radial-gradient(circle, transparent 5%, #00FF00 5%, #00FF00 7%, transparent 7%),
                radial-gradient(circle, transparent 10%, #FF1493 10%, #FF1493 12%, transparent 12%),
                /* Cell 2: High-gloss black/white checkerboard */
                linear-gradient(45deg, #000 25%, transparent 25%, transparent 75%, #000 75%, #000),
                linear-gradient(45deg, #000 25%, transparent 25%, transparent 75%, #000 75%, #000),
                /* Cell 3: Electric blue paisley */
                radial-gradient(ellipse 60px 40px at 20% 30%, rgba(0, 255, 255, 0.4) 0%, transparent 50%),
                radial-gradient(ellipse 60px 40px at 80% 70%, rgba(0, 255, 255, 0.3) 0%, transparent 50%),
                /* Cell 4: Neon geometric rings */
                radial-gradient(circle at 50% 50%, transparent 8%, #FF00FF 8%, #FF00FF 10%, transparent 10%),
                radial-gradient(circle at 50% 50%, transparent 20%, #00FFFF 20%, #00FFFF 22%, transparent 22%);
            background-size: 50% 50%, 50% 50%, 60px 60px, 60px 60px, 50% 50%, 50% 50%, 50% 50%, 50% 50%;
            background-position: 0% 0%, 50% 50%, 0% 50%, 30px 30px, 50% 0%, 50% 0%, 50% 50%, 50% 50%;
            mix-blend-mode: screen;
        }

        .act-2.active {
            background-color: #FF007F;
            box-shadow: 0 0 80px rgba(0, 255, 255, 0.6), inset 0 0 60px rgba(0, 255, 255, 0.3);
        }

        .act-2.active::after {
            opacity: 1;
            background: 
                /* Cell 1: Neon green/pink concentric circles */
                radial-gradient(circle, transparent 3%, #00FF00 3%, #00FF00 6%, transparent 6%, transparent 10%, #FF1493 10%, #FF1493 13%, transparent 13%),
                /* Cell 2: High-gloss black/white checkerboard */
                linear-gradient(45deg, #fff 25%, transparent 25%, transparent 75%, #fff 75%, #fff),
                linear-gradient(45deg, #fff 25%, transparent 25%, transparent 75%, #fff 75%, #fff),
                /* Cell 3: Electric blue paisley */
                radial-gradient(ellipse 70px 50px at 20% 30%, rgba(0, 255, 255, 0.6) 0%, transparent 60%),
                radial-gradient(ellipse 70px 50px at 80% 70%, rgba(0, 255, 255, 0.5) 0%, transparent 60%),
                /* Cell 4: Neon geometric rings */
                radial-gradient(circle at 50% 50%, transparent 6%, #FF00FF 6%, #FF00FF 10%, transparent 10%, transparent 18%, #00FFFF 18%, #00FFFF 22%, transparent 22%);
            background-size: 50% 50%, 60px 60px, 60px 60px, 50% 50%, 50% 50%, 50% 50%;
            background-position: 0% 0%, 0% 50%, 30px 30px, 50% 0%, 50% 0%, 50% 50%;
        }

        .act-2.active .act-content h2 {
            color: #fff;
            text-shadow: -2px 0 #00ffff, 2px 0 #ff0000;
        }

        .act-2.active .act-content p {
            color: #fff;
            text-shadow: -1px 0 #00ffff, 1px 0 #ff0000;
        }

        /* ==========================================================================
           ACT III: ASPHALT SHIMMER (Florida Project / Little Miss Sunshine)
           Base: Sun-Bleached Ochre #F4A460
           Collage: Linoleum, Cheetah, Wood, Stripes
           Performance: Film grain + heat haze skewY
           ========================================================================== */
        .act-3 {
            background-color: #F5F5DC;
            transition: background-color 0.4s ease-in-out, transform 0.4s ease-in-out;
        }

        .act-3 .act-content h2 {
            font-family: 'Alfa Slab One', serif;
            font-size: 3.2rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #008080;
        }

        .act-3 .act-content p {
            font-family: 'Courier New', monospace;
            color: #5a4a2a;
            letter-spacing: 0.05em;
        }

        /* Act III Collage: Weathered, dusty grid */
        .act-3::after {
            background: 
                /* Cell 1: Faded teal floral linoleum */
                radial-gradient(ellipse at 20% 30%, rgba(0, 128, 128, 0.3) 0%, transparent 40%),
                radial-gradient(ellipse at 70% 60%, rgba(0, 128, 128, 0.25) 0%, transparent 35%),
                /* Cell 2: Sun-bleached Cheetah print */
                radial-gradient(ellipse 25px 30px, rgba(139, 69, 19, 0.3) 0%, transparent 100%),
                /* Cell 3: Weathered wood grain */
                repeating-linear-gradient(90deg, transparent 0px, transparent 2px, rgba(139, 90, 43, 0.2) 2px, rgba(139, 90, 43, 0.2) 4px),
                repeating-linear-gradient(0deg, transparent 0px, transparent 8px, rgba(160, 120, 60, 0.15) 8px, rgba(160, 120, 60, 0.15) 16px),
                /* Cell 4: Vintage orange/teal vertical stripes */
                repeating-linear-gradient(90deg, #F4A460 0%, #F4A460 15%, #008080 15%, #008080 30%);
            background-size: 50% 50%, 50% 50%, 80px 80px, 100% 100%, 100% 100%, 50% 50%;
            background-position: 0% 0%, 50% 50%, 0% 50%, 50% 50%, 50% 50%, 50% 50%;
            mix-blend-mode: multiply;
        }

        .act-3.active {
            background-color: #F4A460;
            animation: heatHaze 3s infinite ease-in-out;
        }

        .act-3.active::after {
            opacity: 0.15;
            background: 
                /* Cell 1: Faded teal floral linoleum */
                radial-gradient(ellipse at 15% 25%, rgba(0, 128, 128, 0.4) 0%, transparent 45%),
                radial-gradient(ellipse at 75% 65%, rgba(0, 128, 128, 0.35) 0%, transparent 40%),
                /* Cell 2: Sun-bleached Cheetah print */
                radial-gradient(ellipse 30px 35px, rgba(139, 69, 19, 0.35) 0%, transparent 100%),
                radial-gradient(ellipse 20px 25px, rgba(139, 69, 19, 0.25) 0%, transparent 100%),
                /* Cell 3: Weathered wood grain */
                repeating-linear-gradient(90deg, transparent 0px, transparent 2px, rgba(139, 90, 43, 0.25) 2px, rgba(139, 90, 43, 0.25) 4px),
                repeating-linear-gradient(0deg, transparent 0px, transparent 6px, rgba(160, 120, 60, 0.2) 6px, rgba(160, 120, 60, 0.2) 12px),
                /* Cell 4: Vintage orange/teal vertical stripes */
                repeating-linear-gradient(90deg, #F4A460 0%, #F4A460 12%, #008080 12%, #008080 24%),
                /* Film grain overlay */
                url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='grain'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='3' numOctaves='6'/%3E%3C/filter%3E%3Crect width='200' height='200' filter='url(%23grain)' opacity='0.4'/%3E%3C/svg%3E");
            background-size: 50% 50%, 50% 50%, 80px 80px, 100px 100px, 100% 100%, 100% 100%, 50% 50%, 100% 100%;
            background-position: 0% 0%, 50% 50%, 0% 50%, 25% 25%, 50% 50%, 50% 50%, 50% 50%, 0% 0%;
        }

        .act-3.active .act-content h2 {
            color: #d4a574;
        }

        /* ==========================================================================
           HEAT HAZE ANIMATION
           ========================================================================== */
        @keyframes heatHaze {
            0% { transform: skewY(-0.5deg); }
            50% { transform: skewY(0deg); }
            100% { transform: skewY(0.5deg); }
        }

        /* ==========================================================================
           RESPONSIVE DESIGN
           ========================================================================== */
        @media (max-width: 1024px) {
            .act-1 .act-content h2 { font-size: 3rem; letter-spacing: 0.9rem; }
            .act-2 .act-content h2 { font-size: 4rem; }
            .act-3 .act-content h2 { font-size: 2.5rem; }
        }

        @media (max-width: 768px) {
            main { grid-template-columns: 1fr; }
            main.act-1-active,
            main.act-2-active,
            main.act-3-active { grid-template-columns: 1fr; }

            .act-1 .act-content h2 { font-size: 2.5rem; letter-spacing: 0.7rem; }
            .act-2 .act-content h2 { font-size: 3rem; }
            .act-3 .act-content h2 { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <main>
        <!-- ACT I: Soft Focus -->
        <section class="act act-1">
            <div class="act-content">
                <h2>Act I</h2>
                <p>Soft Focus</p>
            </div>
        </section>

        <!-- ACT II: Glitter in the Dark -->
        <section class="act act-2">
            <div class="act-content">
                <h2>Act II</h2>
                <p>Glitter in the Dark</p>
            </div>
        </section>

        <!-- ACT III: Asphalt Shimmer -->
        <section class="act act-3">
            <div class="act-content">
                <h2>Act III</h2>
                <p>Asphalt Shimmer</p>
            </div>
        </section>
    </main>

    <script>
        const main = document.querySelector('main');
        const acts = document.querySelectorAll('.act');

        acts.forEach((act, index) => {
            act.addEventListener('mouseenter', () => {
                acts.forEach(a => a.classList.remove('active'));
                main.classList.remove('act-1-active', 'act-2-active', 'act-3-active');
                
                act.classList.add('active');
                main.classList.add(`act-${index + 1}-active`);
            });
        });

        main.addEventListener('mouseleave', () => {
            acts.forEach(a => a.classList.remove('active'));
            main.classList.remove('act-1-active', 'act-2-active', 'act-3-active');
        });
    </script>
</body>
</html>

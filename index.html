<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Through The Feminine Gaze</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..900;1,6..96,400..900&family=Anton&family=Space+Mono&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        /* CINEMATIC OVERLAY */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image: url("https://www.transparenttextures.com/patterns/stardust.png");
            opacity: 0.1;
            z-index: 1000;
            pointer-events: none;
        }

        html, body { 
            width: 100%; height: 100vh; overflow: hidden; 
            background-color: #F5F5DC; 
        }

        /* PROJECT HEADER */
        header {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1100;
            pointer-events: none;
        }

        header h1 {
            font-family: 'Bodoni Moda', serif;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.3rem;
            color: #1a1a1a;
        }

        main {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            height: 100vh;
            width: 100vw;
            transition: grid-template-columns 0.9s cubic-bezier(0.85, 0, 0.15, 1);
        }

        /* GRID EXPANSION */
        main.act-1-active { grid-template-columns: 2.5fr 0.25fr 0.25fr; }
        main.act-2-active { grid-template-columns: 0.25fr 2.5fr 0.25fr; }
        main.act-3-active { grid-template-columns: 0.25fr 0.25fr 2.5fr; }

        section.act {
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #F5F5DC;
            transition: all 0.7s ease;
            overflow: hidden;
            border-right: 1px solid rgba(0,0,0,0.05);
            padding: 40px;
        }

        /* --- NEUTRAL UNIFORM STATE --- */
        .act h2 {
            font-family: 'Bodoni Moda', serif;
            font-size: 1.5rem;
            text-transform: uppercase;
            color: #333;
            letter-spacing: 0.2rem;
            transition: all 0.6s ease;
            margin-bottom: 10px;
        }

        .act p {
            font-family: 'Space Mono', monospace; /* Neutral base for subtitles */
            font-size: 0.7rem;
            text-transform: uppercase;
            color: #333;
            letter-spacing: 0.1rem;
            transition: all 0.6s ease;
            opacity: 0.6;
        }

        /* MAXIMALIST HINTS */
        .hint {
            position: absolute;
            font-family: 'Space Mono', monospace;
            font-size: 0.6rem;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        /* ============= ACT I: SOFT FOCUS ============= */
        .act-1.active { background-color: #C3D7E8; }
        .act-1.active h2 { 
            font-size: 5rem;
            font-weight: 300;
            letter-spacing: 1.5rem;
        }
        .act-1.active p { 
            font-family: 'Bodoni Moda', serif;
            font-style: italic;
            font-size: 1.8rem;
            text-transform: none;
            opacity: 1;
            letter-spacing: 0.2rem;
        }

        /* ============= ACT II: GLITTER ============= */
        .act-2.active { background-color: #FF007F; }
        .act-2.active h2 { 
            font-family: 'Anton', sans-serif;
            font-size: 8rem;
            color: #fff;
            letter-spacing: 0;
            transform: scaleY(1.2);
            text-shadow: 5px 5px 0px #001F3F;
        }
        .act-2.active p { 
            font-family: 'Anton', sans-serif;
            font-size: 1.5rem;
            color: #001F3F;
            opacity: 1;
            letter-spacing: 0.5rem;
            background: #fff;
            padding: 0 10px;
        }

        /* ============= ACT III: ASPHALT ============= */
        .act-3.active { background-color: #F4A460; }
        .act-3.active h2 { 
            font-family: 'Alfa Slab One', cursive;
            font-size: 5rem;
            color: #008080;
            letter-spacing: -0.1rem;
        }
        .act-3.active p { 
            font-family: 'Courier Prime', monospace;
            font-weight: 700;
            font-size: 1.2rem;
            color: #d0021b;
            opacity: 1;
            letter-spacing: 0;
            text-transform: uppercase;
        }

        /* ACTIVE FOCUS / BLUR */
        main.act-1-active .act-2, main.act-1-active .act-3,
        main.act-2-active .act-1, main.act-2-active .act-3,
        main.act-3-active .act-1, main.act-3-active .act-2 {
            filter: blur(15px);
            opacity: 0.1;
        }

        .active .hint { opacity: 0.5; }

        @media (max-width: 768px) {
            main { grid-template-columns: 1fr; }
            main.act-1-active, main.act-2-active, main.act-3-active { grid-template-columns: 1fr; }
            header { position: relative; padding: 20px; text-align: center; }
        }
    </style>
</head>
<body>
    <header>
        <h1>Through The Feminine Gaze: A Cinematic Mood Board</h1>
    </header>

    <main>
        <section class="act act-1">
            <span class="hint" style="top:10%; left:10%;">VERSAILLES / SUBURBIA</span>
            <div class="act-content">
                <h2>Act I</h2>
                <p>Soft Focus, Heavy Hearts</p>
            </div>
        </section>

        <section class="act act-2">
            <span class="hint" style="bottom:10%; right:10%;">SPRING BREAK FOREVER</span>
            <div class="act-content">
                <h2>Act II</h2>
                <p>Glitter in the Dark</p>
            </div>
        </section>

        <section class="act act-3">
            <span class="hint" style="top:5%; right:5%;">THE MAGIC CASTLE</span>
            <div class="act-content">
                <h2>Act III</h2>
                <p>Asphalt Shimmer, Diesel Dust</p>
            </div>
        </section>
    </main>

    <script>
        const main = document.querySelector('main');
        const acts = document.querySelectorAll('.act');
        
        acts.forEach((act, index) => {
            act.addEventListener('mouseenter', () => {
                acts.forEach(a => a.classList.remove('active'));
                main.className = `act-${index + 1}-active`;
                act.classList.add('active');
            });
        });

        main.addEventListener('mouseleave', () => {
            acts.forEach(a => a.classList.remove('active'));
            main.className = '';
        });
    </script>
</body>
</html>

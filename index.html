<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hero Faction: Sensory Edition</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..900;1,6..96,400..900&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        /* GLOBAL FILM GRAIN (Constant subtle texture) */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image: url("https://www.transparenttextures.com/patterns/stardust.png");
            opacity: 0.12;
            z-index: 100;
            pointer-events: none;
        }

        html, body { 
            width: 100%; height: 100vh; overflow: hidden; 
            background-color: #F5F5DC; /* Gallery Cream */
        }

        main {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            height: 100vh;
            width: 100vw;
            transition: grid-template-columns 0.8s cubic-bezier(0.77, 0, 0.175, 1);
        }

        /* Hover Expansion */
        main.act-1-active { grid-template-columns: 2.3fr 0.35fr 0.35fr; }
        main.act-2-active { grid-template-columns: 0.35fr 2.3fr 0.35fr; }
        main.act-3-active { grid-template-columns: 0.35fr 0.35fr 2.3fr; }

        section.act {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #F5F5DC;
            transition: background-color 0.6s ease;
            overflow: hidden;
            border-right: 1px solid rgba(0,0,0,0.03);
        }

        .act-content { position: relative; z-index: 50; text-align: center; }

        /* UNIFORM TYPOGRAPHY (Gallery State) */
        section.act h2 {
            font-family: 'Bodoni Moda', serif;
            font-size: clamp(2rem, 5vw, 4rem);
            font-weight: 800;
            text-transform: uppercase;
            color: #222;
            transition: all 0.7s ease;
        }

        section.act p {
            font-family: 'Bodoni Moda', serif;
            font-size: 1.1rem;
            font-style: italic;
            color: #666;
            margin-top: 10px;
            transition: all 0.7s ease;
        }

        /* ============= ACT I: LACE CURTAIN & DRIFT ============= */
        .act-1::after {
            content: ''; 
            position: absolute; 
            inset: -50%; /* Larger than screen to allow for drift */
            z-index: 5; 
            opacity: 0;
            background-image: url("https://www.transparenttextures.com/patterns/shattered-island.png");
            background-size: 400px;
            transition: opacity 1s ease;
            pointer-events: none;
        }

        .act-1.active { background-color: #EBF5FB; }
        .act-1.active::after { 
            opacity: 0.4; 
            animation: laceDrift 15s linear infinite; /* The "Curtain in the Wind" */
        }

        @keyframes laceDrift {
            0% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(2%, 2%) rotate(1deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }

        /* ============= ACT II: CHROMATIC BLUR ============= */
        .act-2.active { background-color: #0A0206; }
        .act-2.active h2 { 
            color: #fff; 
            letter-spacing: -0.2rem;
            /* Chromatic Aberration / Bleeding Edges */
            text-shadow: 
                2px 0 0px rgba(0,255,255,0.8), 
                -2px 0 0px rgba(255,0,255,0.8),
                0 0 15px rgba(255,255,255,0.2);
            animation: textBleed 3s infinite alternate;
        }

        .act-2.active p { color: #00FFFF; opacity: 1; text-shadow: 0 0 8px rgba(0,255,255,0.5); }

        @keyframes textBleed {
            from { filter: blur(0px); transform: scale(1); }
            to { filter: blur(0.8px); transform: scale(1.01); }
        }

        /* ============= ACT III: 35MM FILM FLICKER ============= */
        .act-3::after {
            content: ''; 
            position: absolute; 
            inset: 0; 
            z-index: 10; 
            opacity: 0;
            background: rgba(255,255,255,0.1); /* White flicker frame */
            pointer-events: none;
        }

        .act-3.active { background-color: #F7E71C; } /* Saturated Sunshine Yellow */
        .act-3.active::after { animation: filmFlicker 0.15s infinite; }

        /* Grain Overlay for Act III */
        .act-3::before {
            content: ''; position: absolute; inset: 0; z-index: 5; opacity: 0;
            background-image: url("https://www.transparenttextures.com/patterns/asphalt-dark.png");
            mix-blend-mode: overlay;
        }
        .act-3.active::before { opacity: 0.3; }

        .act-3.active h2 { 
            font-family: 'Alfa Slab One', cursive; 
            color: #E31B23; 
            text-shadow: none;
        }

        @keyframes filmFlicker {
            0% { opacity: 0; }
            50% { opacity: 0.1; }
            100% { opacity: 0.05; }
        }

        /* Responsive */
        @media (max-width: 768px) {
            main { grid-template-columns: 1fr; }
            main.act-1-active, main.act-2-active, main.act-3-active { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <main>
        <section class="act act-1">
            <div class="act-content">
                <h2>Act I</h2>
                <p>Soft Focus, Heavy Hearts</p>
            </div>
        </section>
        <section class="act act-2">
            <div class="act-content">
                <h2>Act II</h2>
                <p>Glitter in the Dark</p>
            </div>
        </section>
        <section class="act act-3">
            <div class="act-content">
                <h2>Act III</h2>
                <p>Asphalt Shimmer, Diesel Dust</p>
            </div>
        </section>
    </main>

    <script>
        const main = document.querySelector('main');
        const acts = document.querySelectorAll('.act');
        
        acts.forEach((act, index) => {
            act.addEventListener('mouseenter', () => {
                acts.forEach(a => a.classList.remove('active'));
                main.className = `act-${index + 1}-active`;
                act.classList.add('active');
            });
        });

        main.addEventListener('mouseleave', () => {
            acts.forEach(a => a.classList.remove('active'));
            main.className = '';
        });
    </script>
</body>
</html>

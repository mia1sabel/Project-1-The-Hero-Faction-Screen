<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Through The Feminine Gaze: A Cinematic Mood Board</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..900;1,6..96,400..900&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* ==========================================================================
           GLOBAL INTERFACE RULES - V2: CINEMATIC TEXTURES
           ========================================================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background-color: #F5F5DC; /* Gallery Cream - Global Default */
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        /* ==========================================================================
           GRID ARCHITECTURE - ASYMMETRICAL BREATH
           ========================================================================== */
        main.poster-container {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            height: 100vh;
            width: 100vw;
            /* Cubic-bezier: slower, exponential transition for analog feel */
            transition: grid-template-columns 0.5s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* Grid Expansion Logic - Asymmetrical Breath */
        main.poster-container.act-1-active {
            grid-template-columns: 2fr 0.5fr 0.5fr;
        }

        main.poster-container.act-2-active {
            grid-template-columns: 0.5fr 2fr 0.5fr;
        }

        main.poster-container.act-3-active {
            grid-template-columns: 0.5fr 0.5fr 2fr;
        }

        /* ==========================================================================
           THREE-LAYER TEXTURE ARCHITECTURE
           Layer 1: Core hex color
           Layer 2: Subtle gradient overlay
           Layer 3: Pattern pseudo-element (independent opacity animation)
           ========================================================================== */
        section.act {
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            cursor: pointer;
            will-change: grid-column, transform;
        }

        /* Layer 2: Subtle depth gradient (applied to all acts) */
        .act::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(255, 255, 255, 0), rgba(0, 0, 0, 0.1));
            z-index: 1;
            pointer-events: none;
            transition: opacity 0.5s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* Layer 3: Pattern Layer (Independent opacity animation) */
        .act::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* Content Container - Always on top (z-index: 3) */
        .act-content {
            position: relative;
            z-index: 3;
            text-align: center;
            max-width: 85%;
            pointer-events: auto;
        }

        .act-content h2 {
            margin-bottom: 0.5rem;
        }

        .act-content p {
            font-size: 0.95rem;
            line-height: 1.6;
            opacity: 0.85;
        }

        /* ==========================================================================
           ACT I: SOFT FOCUS, HEAVY HEARTS (The Dream-State)
           ========================================================================== */
        .act-1 {
            background-color: #F5F5DC; /* Layer 1: Cream */
            transition: background-color 0.5s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .act-1 .act-content h2 {
            font-family: 'Bodoni Moda', serif;
            font-size: 3.5rem;
            font-weight: 700;
            letter-spacing: 0.8rem;
            text-transform: uppercase;
            color: #333; /* Delicate charcoal */
            transition: color 0.5s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .act-1 .act-content p {
            font-family: 'Bodoni Moda', serif;
            font-style: italic;
            color: #555;
        }

        /* Act I Default: Subtle tone-on-tone linen texture */
        .act-1::after {
            background: repeating-linear-gradient(
                0deg,
                transparent 0px,
                transparent 1px,
                rgba(237, 237, 213, 0.3) 1px,
                rgba(237, 237, 213, 0.3) 2px
            ),
            repeating-linear-gradient(
                90deg,
                transparent 0px,
                transparent 1px,
                rgba(237, 237, 213, 0.3) 1px,
                rgba(237, 237, 213, 0.3) 2px
            );
            opacity: 0.4;
        }

        /* Act I Hover: Background color shift */
        .act-1.active {
            background-color: #C3D7E8; /* Soft Blue */
        }

        /* Act I Hover: Toile de Jouy pattern (ornate) */
        .act-1.active::after {
            opacity: 1;
            background: 
                radial-gradient(circle at 20% 30%, rgba(255, 255, 255, 0.4) 2px, transparent 2px),
                radial-gradient(circle at 70% 60%, rgba(255, 255, 255, 0.4) 1.5px, transparent 1.5px),
                radial-gradient(ellipse at 40% 50%, rgba(195, 215, 232, 0.5) 3px, transparent 3px),
                repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(255, 255, 255, 0.1) 10px, rgba(255, 255, 255, 0.1) 20px);
            filter: brightness(1.1) blur(1.5px); /* Bloom filter */
        }

        /* Act I Content: Bloom effect isolation */
        .act-1.active .act-content h2 {
            color: #1a3a52;
            filter: none; /* Text unaffected */
        }

        /* ==========================================================================
           ACT II: GLITTER IN THE DARK (The Synthetic Vibe)
           ========================================================================== */
        .act-2 {
            background-color: #F5F5DC; /* Layer 1: Cream */
            transition: background-color 0.5s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .act-2 .act-content h2 {
            font-family: 'Impact', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-weight: 900;
            font-size: 5rem;
            text-transform: uppercase;
            letter-spacing: -0.02em;
            color: #111;
            transition: text-shadow 0.5s cubic-bezier(0.25, 1, 0.5, 1), 
                        color 0.5s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .act-2 .act-content p {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-weight: bold;
            color: #333;
        }

        /* Act II Default: Muted grey checkerboard (Photoshop canvas) */
        .act-2::after {
            background: 
                linear-gradient(45deg, #e0e0e0 25%, transparent 25%, transparent 75%, #e0e0e0 75%, #e0e0e0),
                linear-gradient(45deg, #e0e0e0 25%, transparent 25%, transparent 75%, #e0e0e0 75%, #e0e0e0);
            background-size: 50px 50px;
            background-position: 0 0, 25px 25px;
            opacity: 0.3;
        }

        /* Act II Hover: Wet plastic + electric blue neon grid */
        .act-2.active {
            background-color: #FF007F; /* Neon Acid Pink */
            box-shadow: 0 0 80px rgba(0, 255, 255, 0.6), inset 0 0 100px rgba(0, 255, 255, 0.2); /* Club Glow */
        }

        .act-2.active::after {
            opacity: 1;
            background: 
                /* Wet plastic specular highlights */
                radial-gradient(ellipse at 30% 30%, rgba(255, 255, 255, 0.3) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 70%, rgba(255, 255, 255, 0.2) 0%, transparent 50%),
                /* Electric blue neon grid */
                linear-gradient(0deg, rgba(0, 255, 255, 0.3) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.3) 1px, transparent 1px);
            background-size: 100% 100%, 100% 100%, 40px 40px, 40px 40px;
            background-position: 0 0, 0 0, 0 0, 0 0;
            filter: none;
        }

        /* Act II Text: Chromatic Aberration */
        .act-2.active .act-content h2 {
            color: #fff;
            text-shadow: -2px 0 #00ffff, 2px 0 #ff0000; /* Chromatic aberration */
        }

        .act-2.active .act-content p {
            color: #fff;
            text-shadow: -1px 0 #00ffff, 1px 0 #ff0000;
        }

        /* ==========================================================================
           ACT III: ASPHALT SHIMMER, DIESEL DUST (The Grit)
           ========================================================================== */
        .act-3 {
            background-color: #F5F5DC; /* Layer 1: Cream */
            transition: background-color 0.5s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .act-3 .act-content h2 {
            font-family: 'Alfa Slab One', serif;
            font-size: 3.2rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #008080; /* Vintage motel teal */
            transition: color 0.5s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .act-3 .act-content p {
            font-family: 'Courier Prime', monospace;
            color: #5a4a2a;
            letter-spacing: 0.05em;
        }

        /* Act III Default: Dusty concrete/sand texture */
        .act-3::after {
            background: 
                radial-gradient(circle at 20% 50%, rgba(100, 100, 100, 0.1) 1px, transparent 1px),
                radial-gradient(circle at 60% 70%, rgba(120, 120, 120, 0.08) 1px, transparent 1px),
                linear-gradient(90deg, transparent 0%, rgba(150, 150, 150, 0.05) 50%, transparent 100%);
            background-size: 50px 50px, 80px 80px, 100% 100%;
            opacity: 0.4;
        }

        /* Act III Hover: Sun-faded floral linoleum (bleached teal & pink) */
        .act-3.active {
            background-color: #F4A460; /* Sun-Bleached Ochre */
            animation: heatShimmer 3s infinite ease-in-out;
        }

        .act-3.active::after {
            opacity: 0.15;
            background: 
                /* Floral pattern with bleached teal & pink */
                radial-gradient(ellipse at 25% 40%, rgba(0, 128, 128, 0.3) 0%, transparent 40%),
                radial-gradient(ellipse at 75% 60%, rgba(255, 192, 203, 0.25) 0%, transparent 40%),
                repeating-linear-gradient(
                    45deg,
                    transparent 0px,
                    transparent 20px,
                    rgba(0, 128, 128, 0.15) 20px,
                    rgba(0, 128, 128, 0.15) 22px,
                    transparent 22px,
                    transparent 40px,
                    rgba(255, 192, 203, 0.15) 40px,
                    rgba(255, 192, 203, 0.15) 42px
                );
            background-size: 100% 100%, 100% 100%, 80px 80px;
        }

        /* High-frequency film grain for Act III */
        .act-3.active::before {
            background: 
                linear-gradient(rgba(255, 255, 255, 0), rgba(0, 0, 0, 0.1)),
                url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='grain'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='2' numOctaves='6' /%3E%3C/filter%3E%3Crect width='200' height='200' filter='url(%23grain)' opacity='0.3'/%3E%3C/svg%3E");
            opacity: 0.15;
        }

        .act-3.active .act-content h2 {
            color: #d4a574;
        }

        /* ==========================================================================
           HEAT SHIMMER ANIMATION
           ========================================================================== */
        @keyframes heatShimmer {
            0% {
                transform: skewY(-0.5deg);
            }
            50% {
                transform: skewY(0deg);
            }
            100% {
                transform: skewY(0.5deg);
            }
        }

        /* ==========================================================================
           RESPONSIVE ADJUSTMENTS
           ========================================================================== */
        @media (max-width: 1024px) {
            .act-1 .act-content h2 { font-size: 3rem; letter-spacing: 0.6rem; }
            .act-2 .act-content h2 { font-size: 4rem; }
            .act-3 .act-content h2 { font-size: 2.5rem; }
        }

        @media (max-width: 768px) {
            .act-1 .act-content h2 { font-size: 2.5rem; letter-spacing: 0.4rem; }
            .act-2 .act-content h2 { font-size: 3rem; }
            .act-3 .act-content h2 { font-size: 2rem; }
            
            main.poster-container {
                grid-template-columns: 1fr;
            }
            
            main.poster-container.act-1-active,
            main.poster-container.act-2-active,
            main.poster-container.act-3-active {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <main class="poster-container">
        <!-- ACT I: Soft Focus, Heavy Hearts -->
        <section class="act act-1">
            <div class="act-content">
                <h2>Act I</h2>
                <p>Soft Focus, Heavy Hearts</p>
            </div>
        </section>

        <!-- ACT II: Glitter in the Dark -->
        <section class="act act-2">
            <div class="act-content">
                <h2>Act II</h2>
                <p>Glitter in the Dark</p>
            </div>
        </section>

        <!-- ACT III: Asphalt Shimmer, Diesel Dust -->
        <section class="act act-3">
            <div class="act-content">
                <h2>Act III</h2>
                <p>Asphalt Shimmer, Diesel Dust</p>
            </div>
        </section>
    </main>

    <script>
        const container = document.querySelector('.poster-container');
        const acts = document.querySelectorAll('.act');

        acts.forEach((act, index) => {
            act.addEventListener('mouseenter', () => {
                // Remove all active classes
                acts.forEach(a => a.classList.remove('active'));
                container.classList.remove('act-1-active', 'act-2-active', 'act-3-active');

                // Add active class to hovered act
                act.classList.add('active');
                container.classList.add(`act-${index + 1}-active`);
            });
        });

        // Reset on mouse leave from container
        container.addEventListener('mouseleave', () => {
            acts.forEach(a => a.classList.remove('active'));
            container.classList.remove('act-1-active', 'act-2-active', 'act-3-active');
        });
    </script>
</body>
</html>

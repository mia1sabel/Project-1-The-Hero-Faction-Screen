<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hero Faction: Textured Edition</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..900;1,6..96,400..900&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        /* GLOBAL TEXTURE OVERLAY - A fine grain that lives over everything */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            background-image: url("https://www.transparenttextures.com/patterns/stardust.png");
            opacity: 0.15;
            z-index: 100;
            pointer-events: none;
        }

        html, body { width: 100%; height: 100vh; overflow: hidden; background-color: #111; }

        main {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            height: 100vh;
            width: 100vw;
            transition: grid-template-columns 0.7s cubic-bezier(0.85, 0, 0.15, 1);
        }

        main.act-1-active { grid-template-columns: 2.2fr 0.4fr 0.4fr; }
        main.act-2-active { grid-template-columns: 0.4fr 2.2fr 0.4fr; }
        main.act-3-active { grid-template-columns: 0.4fr 0.4fr 2.2fr; }

        section.act {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            cursor: pointer;
        }

        .act-content { position: relative; z-index: 20; text-align: center; }

        /* ============= ACT I: SOFT LACE (Blush/Cloud) ============= */
        .act-1 { background-color: #FFF5F7; border-right: 1px solid rgba(0,0,0,0.05); }
        .act-1 h2 { 
            font-family: 'Bodoni Moda', serif; 
            font-size: clamp(2rem, 8vw, 4rem); 
            letter-spacing: 0.8rem; 
            color: #5D6D7E; 
            text-shadow: none;
        }
        .act-1 p { font-family: 'Bodoni Moda', serif; font-style: italic; color: #AAB7B8; margin-top: 10px; }
        
        .act-1::after {
            content: ''; position: absolute; inset: 0; z-index: 5; opacity: 0; transition: opacity 0.5s ease;
            background-image: url("https://www.transparenttextures.com/patterns/shattered-island.png"); /* Fabric-like texture */
            mix-blend-mode: multiply;
        }
        .act-1.active { background-color: #EBF5FB; }
        .act-1.active::after { opacity: 0.4; }

        /* ============= ACT II: EUPHORIA (Neon/Grit) ============= */
        .act-2 { background-color: #F8F8EC; border-right: 1px solid rgba(0,0,0,0.05); }
        .act-2 h2 { 
            font-family: 'Bodoni Moda', serif; 
            font-weight: 900; 
            font-size: clamp(3rem, 10vw, 6.5rem); 
            letter-spacing: -0.3rem; 
            color: #111;
            transition: all 0.5s ease;
        }
        .act-2 p { font-family: 'Courier New', monospace; font-weight: bold; letter-spacing: 0.5rem; color: #444; }
        
        /* Neon Light Leaks */
        .act-2::before {
            content: ''; position: absolute; inset: 0; z-index: 2; opacity: 0; transition: opacity 0.8s;
            background: 
                radial-gradient(circle at 15% 15%, rgba(0, 255, 255, 0.4), transparent 45%),
                radial-gradient(circle at 85% 85%, rgba(255, 0, 127, 0.4), transparent 45%);
        }

        .act-2.active { background-color: #080105; }
        .act-2.active::before { opacity: 1; }
        .act-2.active h2 { 
            color: #fff; 
            /* Chromatic Aberration: subtle color fringing instead of a shadow */
            text-shadow: 1.5px 0 rgba(255,0,255,0.8), -1.5px 0 rgba(0,255,255,0.8); 
        }
        .act-2.active p { color: #00FFFF; opacity: 0.8; }

        /* ============= ACT III: FLORIDA PROJECT (Purple/Yellow/Heat) ============= */
        .act-3 { background-color: #B29AC8; }
        .act-3 h2 { 
            font-family: 'Alfa Slab One', cursive; 
            font-size: clamp(3rem, 10vw, 6rem); 
            color: #FF8C00; 
            transition: all 0.4s ease;
            text-shadow: none;
        }
        .act-3 p { font-family: 'Courier New', monospace; font-weight: bold; letter-spacing: 0.3rem; color: #333; }
        
        /* Asphalt/Concrete Texture Overlay */
        .act-3::after {
            content: ''; position: absolute; inset: 0; z-index: 2; opacity: 0; transition: opacity 0.5s;
            background-image: url("https://www.transparenttextures.com/patterns/asphalt-dark.png");
            mix-blend-mode: overlay;
            pointer-events: none;
        }

        .act-3.active { background-color: #F7E71C; }
        .act-3.active h2 { color: #E31B23; }
        .act-3.active::after { opacity: 0.3; }

        /* Subtle "Breathe" animation for the text to mimic heat shimmer */
        @keyframes shimmer {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.9; transform: scale(1.01); }
        }
        .act-3.active .act-content { animation: shimmer 3s infinite ease-in-out; }

        @media (max-width: 768px) {
            main { grid-template-columns: 1fr; }
            main.act-1-active, main.act-2-active, main.act-3-active { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <main>
        <section class="act act-1">
            <div class="act-content"><h2>Act I</h2><p>Soft Focus</p></div>
        </section>
        <section class="act act-2">
            <div class="act-content"><h2>Act II</h2><p>Glitter in the Dark</p></div>
        </section>
        <section class="act act-3">
            <div class="act-content"><h2>Act III</h2><p>Asphalt Shimmer</p></div>
        </section>
    </main>

    <script>
        const main = document.querySelector('main');
        const acts = document.querySelectorAll('.act');
        acts.forEach((act, index) => {
            act.addEventListener('mouseenter', () => {
                acts.forEach(a => a.classList.remove('active'));
                main.className = `act-${index + 1}-active`;
                act.classList.add('active');
            });
        });
        main.addEventListener('mouseleave', () => {
            acts.forEach(a => a.classList.remove('active'));
            main.className = '';
        });
    </script>
</body>
</html>

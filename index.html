<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Through The Feminine Gaze</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..900;1,6..96,400..900&family=Anton&family=Space+Mono&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        /* CINEMATIC OVERLAY */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image: url("https://www.transparenttextures.com/patterns/stardust.png");
            opacity: 0.12;
            z-index: 1000;
            pointer-events: none;
        }

        html, body { 
            width: 100%; height: 100vh; overflow: hidden; 
            background-color: #F5F5DC; 
        }

        main {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            height: 100vh;
            width: 100vw;
            transition: grid-template-columns 0.9s cubic-bezier(0.85, 0, 0.15, 1);
        }

        /* GRID EXPANSION */
        main.act-1-active { grid-template-columns: 2.5fr 0.25fr 0.25fr; }
        main.act-2-active { grid-template-columns: 0.25fr 2.5fr 0.25fr; }
        main.act-3-active { grid-template-columns: 0.25fr 0.25fr 2.5fr; }

        section.act {
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #F5F5DC;
            transition: all 0.7s ease;
            overflow: hidden;
            border-right: 1px solid rgba(0,0,0,0.05);
            padding: 40px;
        }

        /* NEUTRAL STATE: UNIFORM TITLES */
        .act h2 {
            font-family: 'Bodoni Moda', serif;
            font-size: 1.8rem;
            text-align: center;
            text-transform: uppercase;
            color: #333;
            letter-spacing: 0.1rem;
            transition: all 0.6s ease;
            z-index: 100;
            max-width: 80%;
            line-height: 1.2;
        }

        /* HINTS LAYER (MAXIMALIST CLUTTER) */
        .hint {
            position: absolute;
            font-family: 'Space Mono', monospace;
            font-size: 0.65rem;
            text-transform: uppercase;
            opacity: 0;
            transition: opacity 0.5s ease;
            color: inherit;
        }

        /* ============= ACT I: SOFT FOCUS, HEAVY HEARTS ============= */
        .act-1.active { background-color: #C3D7E8; }
        .act-1.active h2 { 
            font-family: 'Bodoni Moda', serif;
            font-size: 4rem;
            font-weight: 300;
            font-style: italic;
            letter-spacing: 1.2rem;
            color: #5d6d7e;
        }
        /* Delicate Lace/Shattered Glass Overlay */
        .act-1::after {
            content: ''; position: absolute; inset: 0; opacity: 0;
            background-image: url("https://www.transparenttextures.com/patterns/shattered-island.png");
            transition: opacity 1s ease;
            mix-blend-mode: soft-light;
        }
        .act-1.active::after { opacity: 0.6; }

        /* ============= ACT II: GLITTER IN THE DARK ============= */
        .act-2.active { background-color: #FF007F; }
        .act-2.active h2 { 
            font-family: 'Anton', sans-serif;
            font-size: 6rem;
            letter-spacing: -0.1rem;
            color: #fff;
            text-shadow: 6px 6px 0px #001F3F;
            transform: scaleY(1.1);
        }

        /* ============= ACT III: ASPHALT SHIMMER, DIESEL DUST ============= */
        .act-3.active { background-color: #F4A460; }
        .act-3.active h2 { 
            font-family: 'Alfa Slab One', cursive;
            font-size: 4.5rem;
            color: #008080; /* Vintage Motel Teal */
            text-shadow: 3px 3px 0px #d0021b;
            transform: skewX(-4deg);
        }
        /* FADED LINOLEUM TEXTURE */
        .act-3::after {
            content: ''; position: absolute; inset: 0; opacity: 0;
            background: 
                radial-gradient(circle at center, rgba(0,0,0,0.05) 10%, transparent 10.5%),
                linear-gradient(45deg, transparent 48%, rgba(255,255,255,0.1) 50%, transparent 52%);
            background-size: 40px 40px, 100% 100%;
            transition: opacity 1s ease;
        }
        .act-3.active::after { opacity: 1; }

        /* ACTIVE FOCUS LOGIC */
        main.act-1-active .act-2, main.act-1-active .act-3,
        main.act-2-active .act-1, main.act-2-active .act-3,
        main.act-3-active .act-1, main.act-3-active .act-2 {
            filter: blur(15px) grayscale(1);
            opacity: 0.15;
        }

        .active .hint { opacity: 0.7; }

        @media (max-width: 768px) {
            main { grid-template-columns: 1fr; }
            .act h2 { font-size: 1.5rem; }
            main.act-1-active, main.act-2-active, main.act-3-active { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <main>
        <section class="act act-1">
            <span class="hint" style="top:5%; left:5%;">Scene 01: The Garden</span>
            <span class="hint" style="bottom:10%; right:10%;">18th Century / 1970s</span>
            <h2>Act I: Soft Focus, Heavy Hearts</h2>
        </section>

        <section class="act act-2">
            <span class="hint" style="top:15%; right:5%;">HYPER-FEMININITY</span>
            <span class="hint" style="bottom:5%; left:10%;">TRASH-GLAM REDUX</span>
            <h2>Act II: Glitter in the Dark</h2>
        </section>

        <section class="act act-3">
            <span class="hint" style="top:10%; left:10%;">THE FLORIDA SUN</span>
            <span class="hint" style="bottom:15%; right:5%;">DIESEL & DUST</span>
            <h2>Act III: Asphalt Shimmer, Diesel Dust</h2>
        </section>
    </main>

    <script>
        const main = document.querySelector('main');
        const acts = document.querySelectorAll('.act');
        
        acts.forEach((act, index) => {
            act.addEventListener('mouseenter', () => {
                acts.forEach(a => a.classList.remove('active'));
                main.className = `act-${index + 1}-active`;
                act.classList.add('active');
            });
        });

        main.addEventListener('mouseleave', () => {
            acts.forEach(a => a.classList.remove('active'));
            main.className = '';
        });
    </script>
</body>
</html>

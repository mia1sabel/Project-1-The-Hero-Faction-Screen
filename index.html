<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Through The Feminine Gaze: A Cinematic Mood Board</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..900;1,6..96,400..900&display=swap" rel="stylesheet">
    
    <style>
        /* ==========================================================================
           GLOBAL INTERFACE RULES
           ========================================================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            height: 100vh;
            overflow: hidden; /* Prevents scrolling */
            background-color: #F5F5DC; /* Gallery Cream default */
            font-family: sans-serif;
            transition: background-color 0.4s ease-in-out;
        }

        /* The Grid Layout */
        .poster-container {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            height: 100vh;
            width: 100vw;
            transition: grid-template-columns 0.4s ease-in-out;
        }

        /* Common Act Styling */
        .act {
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            text-align: center;
            overflow: hidden;
            transition: background-color 0.4s ease-in-out, box-shadow 0.4s ease-in-out;
            cursor: pointer;
        }

        /* Layer 2: Pattern Layer (::before) */
        .act::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            opacity: 0;
            transition: opacity 0.4s ease-in-out, filter 0.4s ease-in-out;
        }

        /* Layer 3: Universal Film Grain Layer (::after) */
        .act::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            opacity: 0.03; /* Subdued baseline film grain */
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%' height='100%' filter='url(%23noise)'/%3E%3C/svg%3E");
            pointer-events: none;
            transition: opacity 0.4s ease-in-out;
        }

        /* Layer 4: Content Container (Ensures text stays above textures) */
        .act-content {
            position: relative;
            z-index: 3;
            pointer-events: none; 
            max-width: 80%;
        }

        .act-content h1 {
            margin-bottom: 1rem;
        }

        .act-content p {
            font-size: 1rem;
            line-height: 1.5;
            opacity: 0.8;
        }

        /* ==========================================================================
           ACT I: SOFT FOCUS, HEAVY HEARTS
           ========================================================================== */
        .act-1 {
            background-color: #EFEFE5; 
        }

        .act-1 .act-content h1 {
            font-family: "Bodoni Moda", serif;
            font-size: 3.5rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: #2c2c2c;
        }

        /* Act I Pattern: Geometric Toile mimic */
        .act-1::before {
            background-color: #C3D7E8; /* Versailles Blue */
            background-image: repeating-linear-gradient(45deg, rgba(255,255,255,0.07) 0px, rgba(255,255,255,0.07) 2px, transparent 2px, transparent 10px);
        }

        /* Act I Hover Performance */
        .act-1.active {
            background-color: #C3D7E8;
        }

        .act-1.active::before {
            opacity: 1;
            filter: brightness(1.1) blur(0.8px); /* Bloom filter on pattern layer */
        }

        .act-1.active::after {
            opacity: 0.08; /* Slightly heavier grain on hover */
        }

        /* ==========================================================================
           ACT II: GLITTER IN THE DARK
           ========================================================================== */
        .act-2 {
            background-color: #EAEAD5; 
        }

        .act-2 .act-content h1 {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-weight: 900;
            font-stretch: condensed;
            font-size: 5rem;
            text-transform: uppercase;
            color: #111;
            transition: text-shadow 0.4s ease-in-out, color 0.4s ease-in-out;
        }

        /* Act II Pattern: Low Opacity Club Checkerboard */
        .act-2::before {
            background-color: #FF007F; /* Acid Pink */
            background-image: linear-gradient(45deg, #000 25%, transparent 25%, transparent 75%, #000 75%, #000), 
                              linear-gradient(45deg, #000 25%, transparent 25%, transparent 75%, #000 75%, #000);
            background-size: 30px 30px;
            background-position: 0 0, 15px 15px;
        }

        /* Act II Hover Performance */
        .act-2.active {
            background-color: #FF007F;
            box-shadow: inset 0 0 100px rgba(0, 255, 255, 0.5), 0 0 50px rgba(255, 0, 127, 0.3);
        }

        .act-2.active::before {
            opacity: 0.15; /* Subdued as requested */
        }

        .act-2.active .act-content h1 {
            color: #fff;
            /* Chromatic Aberration text split */
            text-shadow: -3px 0 #00ffff, 3px 0 #ff0000;
        }

        .act-2.active::after {
            opacity: 0.05;
        }

        /* ==========================================================================
           ACT III: ASPHALT SHIMMER, DIESEL DUST
           ========================================================================== */
        .act-3 {
            background-color: #DFDFCC;
            transition: transform 0.3s ease-in-out, background-color 0.4s ease-in-out;
        }

        .act-3 .act-content h1 {
            font-family: 'Alfa Slab One', serif;
            font-size: 3rem;
            text-transform: uppercase;
            color: #3d2612;
        }

        /* Act III Pattern: Prioritizing pure heavy texture */
        .act-3::before {
            background-color: #F4A460; /* Sun-Bleached Ochre */
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='heavyNoise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.95' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%' height='100%' filter='url(%23heavyNoise)'/%3E%3C/svg%3E");
        }

        /* Act III Hover Performance */
        .act-3.active {
            background-color: #F4A460;
            animation: heatHaze 0.3s infinite alternate ease-in-out;
        }

        .act-3.active::before {
            opacity: 0.25; /* Saturated grit */
        }

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Through The Feminine Gaze: A Cinematic Mood Board</title>
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        html, body { 
            width: 100%; height: 100vh; overflow: hidden; 
            background-color: #F5F5DC; 
            color: #1a1a1a;
        }

        /* Film Grain Effect */
        body::before {
            content: ""; position: fixed; inset: 0;
            background-image: url("https://www.transparenttextures.com/patterns/stardust.png");
            opacity: 0.2; z-index: 1000; pointer-events: none;
        }

        .letterbox {
            position: fixed; left: 0; right: 0; height: 8vh;
            background-color: #000; z-index: 1050;
            transition: height 0.8s ease;
        }
        .letterbox.top { top: 0; }
        .letterbox.bottom { bottom: 0; }

        header {
            position: fixed; top: 35px; left: 35px; z-index: 1100;
        }
        header h1 {
            font-family: "Times New Roman", Times, serif;
            font-size: 0.85rem; text-transform: uppercase; 
            letter-spacing: 0.5rem; color: #555; font-weight: 400;
        }

        main {
            display: grid; grid-template-columns: 1fr 1fr 1fr;
            height: 100vh; width: 100vw;
            transition: all 0.9s cubic-bezier(0.85, 0, 0.15, 1);
        }

        /* Dynamic Widths */
        main.act-1-active { grid-template-columns: 3fr 0.4fr 0.4fr; }
        main.act-2-active { grid-template-columns: 0.4fr 3fr 0.4fr; }
        main.act-3-active { grid-template-columns: 0.4fr 0.4fr 3fr; }

        section.act {
            position: relative; display: flex; justify-content: center; 
            align-items: center; overflow: hidden;
            border-right: 1px solid rgba(0,0,0,0.05);
            transition: background 0.6s ease;
        }

        .act h2 {
            font-size: 2.2rem; text-transform: uppercase; z-index: 50; 
            pointer-events: none; transition: 0.5s;
        }

        .floating-asset {
            position: absolute; opacity: 0; pointer-events: none;
            transition: opacity 0.6s ease, transform 0.8s ease;
            z-index: 10;
        }
        .active .floating-asset { opacity: 1; }

        /* Act I: Soft Focus - Uses Elegant Serif */
        .act-1.active { background-color: #f2e9e4; }
        .act-1 h2 { font-family: "Times New Roman", Times, serif; font-style: italic; font-weight: 400; }
        .act-1 .asset-1 { top: 10%; left: 10%; width: 20%; } 
        .act-1 .asset-2 { bottom: 10%; right: 10%; width: 30%; } 
        .act-1 .asset-3 { top: 15%; right: 15%; width: 22%; }
        .act-1 .asset-4 { bottom: 25%; left: 15%; width: 18%; }
        .act-1 .asset-5 { top: 45%; left: 5%; width: 15%; }
        .act-1 .asset-6 { top: 5%; left: 40%; width: 22%; } /* Updated for musicsheet.jpg */
        .act-1 .asset-7 { bottom: 5%; left: 35%; width: 20%; }

        /* Act II: Glitter - Uses Bold/Impact Sans */
        .act-2.active { background-color: #D6006D; color: #fff; }
        .act-2 h2 { font-family: Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif; font-size: 4rem; letter-spacing: 2px; }
        .act-2 .asset-1 { top: 12%; left: 5%; width: 15%; }
        .act-2 .asset-2 { top: 18%; right: 8%; width: 16%; }
        .act-2 .asset-3 { bottom: 15%; left: 12%; width: 22%; }
        .act-2 .asset-4 { bottom: 12%; right: 10%; width: 20%; }
        .act-2 .asset-5 { top: 6%; left: 35%; width: 13%; }
        .act-2 .asset-6, .act-2 .asset-7 { mix-blend-mode: screen; width: 35%; }
        .act-2 .asset-6 { bottom: 25%; left: 5%; }
        .act-2 .asset-7 { top: 35%; right: 5%; }

        /* Act III: Asphalt - Uses Heavy Slab Serif */
        .act-3.active { background-color: #d4a373; color: #2d3a1e; }
        .act-3 h2 { font-family: Georgia, serif; font-weight: 900; font-size: 3rem; }
        .act-3 .asset-1 { top: 10%; right: 10%; width: 28%; }
        .act-3 .asset-2 { bottom: 12%; left: 10%; width: 24%; }
        .act-3 .asset-3 { top: 22%; left: 8%; width: 16%; }
        .act-3 .asset-4 { bottom: 28%; right: 12%; width: 18%; }
        .act-3 .asset-5 { top: 7%; left: 38%; width: 20%; }
        .act-3 .asset-6 { bottom: 8%; left: 42%; width: 14%; }
    </style>
</head>
<body>
    <div class="letterbox top"></div>
    <div class="letterbox bottom"></div>

    <header><h1>Through The Feminine Gaze: A Cinematic Mood Board</h1></header>

    <main id="board">
        <section class="act act-1">
            <img src="ribbon.png" class="floating-asset asset-1">
            <img src="lace.png" class="floating-asset asset-2">
            <img src="pearls.png" class="floating-asset asset-3">
            <img src="flower1.jpg" class="floating-asset asset-4">
            <img src="flower2.jpg" class="floating-asset asset-5">
            <img src="musicsheet.jpg" class="floating-asset asset-6">
            <img src="letter2.png" class="floating-asset asset-7">
            <h2>Act I: Soft Focus</h2>
        </section>

        <section class="act act-2">
            <img src="candy1.webp" class="floating-asset asset-1">
            <img src="candy2.png" class="floating-asset asset-2">
            <img src="gun.png" class="floating-asset asset-3">
            <img src="kiss.png" class="floating-asset asset-4">
            <img src="pills.webp" class="floating-asset asset-5">
            <img src="shards.jpg" class="floating-asset asset-6">
            <img src="sparkles.jpg" class="floating-asset asset-7">
            <h2>Act II: Glitter</h2>
        </section>

        <section class="act act-3">
            <img src="motel.jpg" class="floating-asset asset-1">
            <img src="polaroid.jpg" class="floating-asset asset-2">
            <img src="icecream.png" class="floating-asset asset-3">
            <img src="Dandelion.png" class="floating-asset asset-4">
            <img src="receipt.jpg" class="floating-asset asset-5">
            <img src="sticker.webp" class="floating-asset asset-6">
            <h2>Act III: Asphalt</h2>
        </section>
    </main>

    <script>
        const board = document.getElementById('board');
        const acts = document.querySelectorAll('.act');
        
        acts.forEach((act, index) => {
            act.addEventListener('mouseenter', () => {
                acts.forEach(a => a.classList.remove('active'));
                board.className = `act-${index + 1}-active`;
                act.classList.add('active');
            });
        });

        board.addEventListener('mouseleave', () => {
            acts.forEach(a => a.classList.remove('active'));
            board.className = '';
        });
    </script>
</body>
</html>

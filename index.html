<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Through The Feminine Gaze: The Hero Faction</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..900;1,6..96,400..900&family=Impact&display=swap" rel="stylesheet">
    
    <style>
        /* GLOBAL */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100vh; overflow: hidden; background-color: #F5F5DC; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

        main {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            height: 100vh;
            width: 100vw;
            transition: grid-template-columns 0.4s ease-in-out;
        }

        main.act-1-active { grid-template-columns: 2fr 0.5fr 0.5fr; }
        main.act-2-active { grid-template-columns: 0.5fr 2fr 0.5fr; }
        main.act-3-active { grid-template-columns: 0.5fr 0.5fr 2fr; }

        section.act {
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            cursor: pointer;
        }

        .act-content {
            position: relative;
            z-index: 10; /* Keep text above all textures */
            text-align: center;
            max-width: 85%;
        }

        .act-content h2 {
            margin-bottom: 0.5rem;
            transition: text-shadow 0.4s ease-in-out, color 0.4s ease-in-out, filter 0.4s ease-in-out;
        }

        /* ============= ACT I: SOFT FOCUS ============= */
        .act-1 {
            background-color: #F5F5DC;
            transition: background-color 0.4s ease-in-out;
        }

        .act-1 .act-content h2 {
            font-family: 'Bodoni Moda', serif;
            font-size: 3.5rem;
            font-weight: 700;
            letter-spacing: 1.2rem;
            text-transform: uppercase;
            color: #333;
        }

        .act-1 .act-content p {
            font-family: 'Bodoni Moda', serif;
            font-style: italic;
            color: #666;
        }

        /* LAYER 1: Tobacco/Sun Haze (Glow in top left) */
        .act-1::before {
            content: '';
            position: absolute;
            top: -10%;
            left: -10%;
            width: 70%;
            height: 70%;
            z-index: 1;
            /* Warm tobacco yellow glow */
            background: radial-gradient(circle at center, rgba(245, 230, 170, 0.7) 0%, transparent 70%);
            filter: blur(50px);
            opacity: 0;
            transition: opacity 0.5s ease;
            pointer-events: none;
        }

        /* LAYER 2: The Patchwork Textures */
        .act-1::after {
            content: '';
            position: absolute;
            inset: 0;
            z-index: 2;
            opacity: 0;
            transition: opacity 0.4s ease-in-out;
            pointer-events: none;
            mix-blend-mode: multiply; /* Blends textures into the blue background */
            
            background-image: 
                /* 1. Rose Circular Motifs */
                radial-gradient(circle, rgba(255, 182, 193, 0.4) 10%, transparent 11%),
                /* 2. Pale Pink Vertical Stripes */
                linear-gradient(90deg, rgba(255, 192, 203, 0.25) 20%, transparent 20%),
                /* 3. Diagonal Lace Pattern */
                repeating-linear-gradient(45deg, rgba(255, 255, 255, 0.3) 0px, rgba(255, 255, 255, 0.3) 1px, transparent 1px, transparent 15px),
                /* 4. Fine Grain Cross-hatch */
                repeating-linear-gradient(-45deg, rgba(0, 0, 0, 0.03) 0px, rgba(0, 0, 0, 0.03) 1px, transparent 1px, transparent 6px);
            
            background-size: 60px 60px, 40px 100%, 20px 20px, 10px 10px;
        }

        /* Act I Active States */
        .act-1.active {
            background-color: #C3D7E8; /* Soft Blue Base */
        }

        .act-1.active::before {
            opacity: 1; /* Show Haze */
        }

        .act-1.active::after {
            opacity: 0.6; /* Show Patchwork */
        }

        .act-1.active .act-content h2 {
            color: #1a3a52;
            filter: drop-shadow(0 4px 10px rgba(0, 0, 0, 0.25));
        }

        /* ============= ACT II: GLITTER ============= */
        .act-2 { background-color: #F5F5DC; transition: background-color 0.4s ease-in-out; }
        .act-2 .act-content h2 { font-family: 'Impact', sans-serif; font-size: 5rem; color: #111; }
        .act-2.active { background-color: #FF007F; box-shadow: 0 0 80px rgba(0, 255, 255, 0.6); }
        .act-2.active .act-content h2 { color: #fff; text-shadow: -2px 0 #00ffff, 2px 0 #ff0000; }

        /* ============= ACT III: ASPHALT ============= */
        .act-3 { background-color: #F5F5DC; transition: background-color 0.4s ease-in-out; }
        .act-3 .act-content h2 { font-family: 'Alfa Slab One', serif; font-size: 3.2rem; color: #008080; }
        .act-3.active { background-color: #F4A460; animation: heatHaze 3s infinite ease-in-out; }

        @keyframes heatHaze {
            0% { transform: skewY(-0.5deg); }
            50% { transform: skewY(0deg); }
            100% { transform: skewY(0.5deg); }
        }

        /* Responsiveness */
        @media (max-width: 768px) {
            main { grid-template-columns: 1fr; }
            main.act-1-active, main.act-2-active, main.act-3-active { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <main>
        <section class="act act-1">
            <div class="act-content">
                <h2>Act I</h2>
                <p>Soft Focus</p>
            </div>
        </section>
        <section class="act act-2">
            <div class="act-content">
                <h2>Act II</h2>
                <p>Glitter in the Dark</p>
            </div>
        </section>
        <section class="act act-3">
            <div class="act-content">
                <h2>Act III</h2>
                <p>Asphalt Shimmer</p>
            </div>
        </section>
    </main>

    <script>
        const main = document.querySelector('main');
        const acts = document.querySelectorAll('.act');
        
        acts.forEach((act, index) => {
            act.addEventListener('mouseenter', () => {
                acts.forEach(a => a.classList.remove('active'));
                main.classList.remove('act-1-active', 'act-2-active', 'act-3-active');
                act.classList.add('active');
                main.classList.add(`act-${index + 1}-active`);
            });
        });

        main.addEventListener('mouseleave', () => {
            acts.forEach(a => a.classList.remove('active'));
            main.classList.remove('act-1-active', 'act-2-active', 'act-3-active');
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hero Faction: The Vision Realized</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..900;1,6..96,400..900&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        /* CINEMATIC FILM GRAIN */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image: url("https://www.transparenttextures.com/patterns/stardust.png");
            opacity: 0.18;
            z-index: 100;
            pointer-events: none;
        }

        html, body { 
            width: 100%; height: 100vh; overflow: hidden; 
            background-color: #F5F5DC; /* Your Gallery Cream */
        }

        main {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            height: 100vh;
            width: 100vw;
            transition: grid-template-columns 0.9s cubic-bezier(0.85, 0, 0.15, 1);
        }

        /* expansion logic with a focus blur on neighbors */
        main.act-1-active { grid-template-columns: 2.5fr 0.25fr 0.25fr; }
        main.act-2-active { grid-template-columns: 0.25fr 2.5fr 0.25fr; }
        main.act-3-active { grid-template-columns: 0.25fr 0.25fr 2.5fr; }

        section.act {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #F5F5DC;
            transition: all 0.7s ease;
            overflow: hidden;
            border-right: 1px solid rgba(0,0,0,0.05);
        }

        .act-content { 
            position: relative; 
            z-index: 50; 
            text-align: center; 
            width: 100%;
            transition: transform 0.6s ease, opacity 0.4s ease;
        }

        /* TYPOGRAPHY - Clean & Neutral Start */
        section.act h2 {
            font-family: 'Bodoni Moda', serif;
            font-size: clamp(1.5rem, 5vw, 4.5rem);
            font-weight: 900;
            text-transform: uppercase;
            color: #1a1a1a;
            letter-spacing: 0.1rem;
            transition: all 0.8s ease;
        }

        section.act p {
            font-family: 'Bodoni Moda', serif;
            font-size: clamp(0.8rem, 1.5vw, 1.3rem);
            font-style: italic;
            color: #4a4a4a;
            margin-top: 15px;
            letter-spacing: 0.05rem;
            transition: all 0.6s ease;
            opacity: 0.7;
        }

        /* NON-ACTIVE STATES (The Blur) */
        main.act-1-active .act-2, main.act-1-active .act-3,
        main.act-2-active .act-1, main.act-2-active .act-3,
        main.act-3-active .act-1, main.act-3-active .act-2 {
            filter: blur(4px) grayscale(0.5);
        }

        /* ============= ACT I: SOFT FOCUS / HEAVY HEARTS ============= */
        .act-1.active { background-color: #dbe9f4; }
        .act-1.active h2 { letter-spacing: 1.8rem; color: #5d6d7e; font-weight: 400; }
        .act-1.active p { opacity: 1; letter-spacing: 0.2rem; }
        
        /* Subtle Lace Texture overlay */
        .act-1::after {
            content: ''; position: absolute; inset: 0; z-index: 5; opacity: 0;
            background-image: url("https://www.transparenttextures.com/patterns/shattered-island.png");
            transition: opacity 1s ease;
            mix-blend-mode: multiply;
        }
        .act-1.active::after { opacity: 0.4; }

        /* ============= ACT II: GLITTER IN THE DARK ============= */
        .act-2.active { background-color: #0d0208; }
        .act-2.active h2 { 
            color: #fff; 
            letter-spacing: -0.2rem;
            text-shadow: 3px 0 15px rgba(0,255,255,0.7), -3px 0 15px rgba(255,0,255,0.7); 
        }
        .act-2.active p { 
            color: #f0f; 
            opacity: 1; 
            text-shadow: 0 0 10px #f0f;
            animation: glitterPulse 1.5s infinite alternate;
        }

        @keyframes glitterPulse {
            from { opacity: 0.6; filter: brightness(1); }
            to { opacity: 1; filter: brightness(1.5); }
        }

        /* ============= ACT III: ASPHALT SHIMMER / DIESEL DUST ============= */
        .act-3.active { background-color: #f7b500; } /* Saturated Florida Sunshine */
        .act-3.active h2 { 
            font-family: 'Alfa Slab One', cursive;
            color: #d0021b;
            transform: scale(1.1);
        }
        .act-3.active p { 
            color: #000; 
            opacity: 1; 
            font-style: normal; 
            font-weight: 900; 
            text-transform: uppercase;
            animation: heatWave 2s infinite ease-in-out;
        }

        @keyframes heatWave {
            0%, 100% { transform: translateY(0) skewX(0); }
            50% { transform: translateY(-2px) skewX(1deg); }
        }

        /* Mobile */
        @media (max-width: 768px) {
            main { grid-template-columns: 1fr; }
            main.act-1-active, main.act-2-active, main.act-3-active { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <main>
        <section class="act act-1">
            <div class="act-content">
                <h2>Act I</h2>
                <p>Soft Focus, Heavy Hearts</p>
            </div>
        </section>
        <section class="act act-2">
            <div class="act-content">
                <h2>Act II</h2>
                <p>Glitter in the Dark</p>
            </div>
        </section>
        <section class="act act-3">
            <div class="act-content">
                <h2>Act III</h2>
                <p>Asphalt Shimmer, Diesel Dust</p>
            </div>
        </section>
    </main>

    <script>
        const main = document.querySelector('main');
        const acts = document.querySelectorAll('.act');
        
        acts.forEach((act, index) => {
            act.addEventListener('mouseenter', () => {
                acts.forEach(a => a.classList.remove('active'));
                main.className = `act-${index + 1}-active`;
                act.classList.add('active');
            });
        });

        main.addEventListener('mouseleave', () => {
            acts.forEach(a => a.classList.remove('active'));
            main.className = '';
        });
    </script>
</body>
</html>

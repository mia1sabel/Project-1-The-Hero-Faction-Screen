<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Through The Feminine Gaze</title>
    <link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Bodoni+Moda:ital,wght@0,400;1,400&family=Anton&family=Space+Mono&family=Courier+Prime:wght@700&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100vh; overflow: hidden; background-color: #F5F5DC; font-family: 'Bodoni Moda', serif; }

        /* Cinematic Overlays */
        body::before { content: ""; position: fixed; inset: 0; background-image: url("https://www.transparenttextures.com/patterns/stardust.png"); opacity: 0.3; z-index: 1000; pointer-events: none; }
        .letterbox { position: fixed; left: 0; right: 0; height: 8vh; background: #050505; z-index: 1050; transition: 0.8s; }
        .letterbox.top { top: 0; } .letterbox.bottom { bottom: 0; }
        .is-active .letterbox { height: 0; }

        main { display: grid; grid-template-columns: 1fr 1fr 1fr; height: 100vh; transition: 0.9s cubic-bezier(0.85, 0, 0.15, 1); }
        main.act-1-active { grid-template-columns: 2.5fr 0.25fr 0.25fr; }
        main.act-2-active { grid-template-columns: 0.25fr 2.5fr 0.25fr; }
        main.act-3-active { grid-template-columns: 0.25fr 0.25fr 2.5fr; }

        section.act { position: relative; display: flex; flex-direction: column; justify-content: center; align-items: center; overflow: hidden; border-right: 1px solid rgba(0,0,0,0.1); }
        
        /* Typography */
        .act h2 { font-size: 1.5rem; text-transform: uppercase; letter-spacing: 0.2rem; z-index: 50; transition: 0.6s; text-align: center; }
        .act h2 .subtitle { font-family: 'Space Mono', monospace; font-size: 0.7rem; display: block; margin-top: 10px; opacity: 0.6; }

        /* Act Specifics */
        .act-1.active { background-color: #C3D7E8; }
        .act-1.active h2 { font-size: 4rem; letter-spacing: 1rem; }
        .act-2.active { background-color: #FF007F; }
        .act-2.active h2 { font-family: 'Anton'; font-size: 6rem; color: white; }
        .act-3.active { background-color: #F4A460; }
        .act-3.active h2 { font-family: 'Alfa Slab One'; font-size: 4rem; color: #008080; }

        /* The Assets */
        .asset { position: absolute; opacity: 0; transition: 1s; z-index: 10; pointer-events: none; }
        .active .asset { opacity: 1; }

        /* Positioning your specific files */
        .p-pearls { top: 10%; right: 10%; width: 150px; }
        .p-music { bottom: 10%; left: 5%; width: 200px; transform: rotate(-10deg); }
        .p-letter { top: 20%; left: 10%; width: 180px; }
        .p-gun { bottom: 15%; right: 5%; width: 200px; }
        .p-pills { top: 15%; right: 15%; width: 120px; }
        .p-kiss { top: 10%; left: 20%; width: 100px; }
        .p-sticker { bottom: 10%; left: 10%; width: 120px; }
        .p-receipt { bottom: 5%; right: 10%; width: 150px; }

        /* Animations */
        .active .p-pearls { animation: float 4s infinite ease-in-out; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        main.act-1-active .act-2, main.act-1-active .act-3,
        main.act-2-active .act-1, main.act-2-active .act-3,
        main.act-3-active .act-1, main.act-3-active .act-2 { filter: blur(15px); opacity: 0.3; }
    </style>
</head>
<body>
    <div class="letterbox top"></div>
    <div class="letterbox bottom"></div>

    <main>
        <section class="act act-1">
            <img src="pearls.png" class="asset p-pearls">
            <img src="musicsheet.jpg" class="asset p-music">
            <img src="letter1.png" class="asset p-letter">
            <div class="act-content">
                <h2>Act I: <span class="subtitle">Soft Focus, Heavy Hearts</span></h2>
            </div>
        </section>

        <section class="act act-2">
            <img src="gun.png" class="asset p-gun">
            <img src="pills.webp" class="asset p-pills">
            <img src="kiss.png" class="asset p-kiss">
            <div class="act-content">
                <h2>Act II: <span class="subtitle">Glitter in the Dark</span></h2>
            </div>
        </section>

        <section class="act act-3">
            <img src="sticker.webp" class="asset p-sticker">
            <img src="receipt.jpg" class="asset p-receipt">
            <div class="act-content">
                <h2>Act III: <span class="subtitle">Asphalt Shimmer, Diesel Dust</span></h2>
            </div>
        </section>
    </main>

    <script>
        const main = document.querySelector('main');
        const acts = document.querySelectorAll('.act');
        acts.forEach((act, i) => {
            act.addEventListener('mouseenter', () => {
                main.className = `act-${i+1}-active`;
                act.classList.add('active');
                document.body.classList.add('is-active');
            });
            act.addEventListener('mouseleave', () => {
                main.className = '';
                act.classList.remove('active');
                document.body.classList.remove('is-active');
            });
        });
    </script>
</body>
</html>

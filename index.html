<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Through The Feminine Gaze</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..900;1,6..96,400..900&family=Anton&family=Space+Mono&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        html, body { 
            width: 100%; height: 100vh; overflow: hidden; 
            background-color: #F5F5DC; 
        }

        /* Cinematic Overlays */
        body::before {
            content: ""; position: fixed; inset: 0;
            background-image: url("https://www.transparenttextures.com/patterns/stardust.png");
            opacity: 0.3; z-index: 1000; pointer-events: none;
        }

        .letterbox {
            position: fixed; left: 0; right: 0; height: 8vh;
            background-color: #050505; z-index: 1050;
            transition: height 0.8s cubic-bezier(0.85, 0, 0.15, 1);
            pointer-events: none;
        }
        .letterbox.top { top: 0; }
        .letterbox.bottom { bottom: 0; }
        .is-active .letterbox { height: 0; }

        /* GRID SETUP */
        main {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            height: 100vh; width: 100vw;
            transition: grid-template-columns 0.9s cubic-bezier(0.85, 0, 0.15, 1);
        }

        main.act-1-active { grid-template-columns: 2.5fr 0.25fr 0.25fr; }
        main.act-2-active { grid-template-columns: 0.25fr 2.5fr 0.25fr; }
        main.act-3-active { grid-template-columns: 0.25fr 0.25fr 2.5fr; }

        section.act {
            position: relative;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            overflow: hidden; border-right: 1px solid rgba(0,0,0,0.1);
        }

        /* Typography */
        .act h2 {
            font-family: 'Bodoni Moda', serif; font-size: 1.5rem;
            text-transform: uppercase; color: #111; letter-spacing: 0.2rem;
            transition: all 0.6s ease; text-align: center; z-index: 50;
        }
        .act h2 .subtitle {
            font-family: 'Space Mono', monospace; font-size: 0.7rem;
            display: block; margin-top: 10px; opacity: 0.6;
        }

        /* NEW DEPTH CLASSES */
        .asset {
            position: absolute; opacity: 0; pointer-events: none;
            transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        .active .asset { opacity: 1; }

        .asset-background {
            z-index: 5; opacity: 0.1; /* Very subtle until active */
            filter: blur(2px); 
        }
        .active .asset-background { opacity: 0.4; }

        .asset-foreground {
            z-index: 70;
            filter: drop-shadow(5px 5px 15px rgba(0,0,0,0.3));
        }

        /* ACT 1 Styles */
        .act-1.active { background-color: #C3D7E8; }
        .act-1.active h2 { font-size: 5rem; font-weight: 300; }

        /* ACT 2 Styles */
        .act-2.active { background-color: #FF007F; }
        .act-2.active h2 { font-family: 'Anton'; font-size: 8rem; color: #fff; }

        /* ACT 3 Styles */
        .act-3.active { background-color: #F4A460; }
        .act-3.active h2 { font-family: 'Alfa Slab One'; font-size: 5rem; color: #008080; }

        /* Neighbor Blurring */
        main.act-1-active .act-2, main.act-1-active .act-3,
        main.act-2-active .act-1, main.act-2-active .act-3,
        main.act-3-active .act-1, main.act-3-active .act-2 {
            filter: blur(15px); opacity: 0.2;
        }
    </style>
</head>
<body>
    <div class="letterbox top"></div>
    <div class="letterbox bottom"></div>

    <main>
        <section class="act act-1">
            <img src="musicsheet.jpg" class="asset asset-background" style="top:5%; left:5%; width:40%;">
            <img src="flower1.jpg" class="asset asset-background" style="bottom:10%; right:10%; width:30%;">
            <img src="letter1.png" class="asset asset-foreground" style="top:20%; right:15%; width:25%;">
            <img src="pearls.png" class="asset asset-foreground" style="bottom:20%; left:15%; width:20%;">
            <img src="letter2.png" class="asset asset-foreground" style="top:40%; left:5%; width:15%;">
            <div class="act-content">
                <h2>Act I: <span class="subtitle">Soft Focus, Heavy Hearts</span></h2>
            </div>
        </section>

        <section class="act act-2">
            <img src="shards.jpg" class="asset asset-background" style="inset:0; width:100%; height:100%; object-fit:cover;">
            <img src="gun.png" class="asset asset-foreground" style="bottom:10%; right:5%; width:30%;">
            <img src="pills.webp" class="asset asset-foreground" style="top:10%; left:10%; width:15%;">
            <img src="kiss.png" class="asset asset-foreground" style="top:20%; right:20%; width:15%;">
            <img src="candy1.webp" class="asset asset-foreground" style="bottom:15%; left:5%; width:20%;">
            <div class="act-content">
                <h2>Act II: <span class="subtitle">Glitter in the Dark</span></h2>
            </div>
        </section>

        <section class="act act-3">
            <img src="receipt.jpg" class="asset asset-background" style="top:10%; right:10%; width:30%; transform:rotate(5deg);">
            <img src="Dandelion.png" class="asset asset-foreground" style="top:15%; left:10%; width:20%;">
            <img src="sticker.webp" class="asset asset-foreground" style="bottom:10%; right:15%; width:15%;">
            <img src="icecream.png" class="asset asset-foreground" style="bottom:5%; left:5%; width:25%;">
            <img src="candy2.png" class="asset asset-foreground" style="top:5%; left:30%; width:15%;">
            <img src="flower2.jpg" class="asset asset-background" style="bottom:20%; right:5%; width:20%;">
            <div class="act-content">
                <h2>Act III: <span class="subtitle">Asphalt Shimmer, Diesel Dust</span></h2>
            </div>
        </section>
    </main>

    <script>
        const main = document.querySelector('main');
        const acts = document.querySelectorAll('.act');
        acts.forEach((act, i) => {
            act.addEventListener('mouseenter', () => {
                main.className = `act-${i+1}-active`;
                act.classList.add('active');
                document.body.classList.add('is-active');
            });
            act.addEventListener('mouseleave', () => {
                main.className = '';
                act.classList.remove('active');
                document.body.classList.remove('is-active');
            });
        });
    </script>
</body>
</html>

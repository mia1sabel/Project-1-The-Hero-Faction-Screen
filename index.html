<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Through The Feminine Gaze: A Cinematic Mood Board</title>

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        /* THE NEUTRAL FILM STATE */
        html, body { 
            width: 100%; height: 100vh; overflow: hidden; 
            background-color: #F5F5DC; 
        }

        /* Global Film Grain */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image: url("https://www.transparenttextures.com/patterns/stardust.png");
            opacity: 0.3;
            z-index: 1000;
            pointer-events: none;
            mix-blend-mode: multiply;
        }

        /* Cinematic Letterboxing */
        .letterbox {
            position: fixed;
            left: 0; right: 0;
            height: 8vh;
            background-color: #050505;
            z-index: 1050;
            transition: height 0.8s cubic-bezier(0.85, 0, 0.15, 1);
            pointer-events: none;
        }
        .letterbox.top { top: 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .letterbox.bottom { bottom: 0; border-top: 1px solid rgba(255,255,255,0.1); }

        .is-active .letterbox { height: 0; }

        /* PROJECT HEADER */
        header {
            position: fixed;
            top: 25px;
            left: 25px;
            z-index: 1100;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }
        header h1 {
            font-family: 'Bodoni Moda', serif;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.4rem;
            color: #666; /* Matching your earlier intent */
        }
        .is-active header { opacity: 0; } 

        /* GRID SETUP */
        main {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            height: 100vh;
            width: 100vw;
            transition: grid-template-columns 0.9s cubic-bezier(0.85, 0, 0.15, 1);
        }

        main.act-1-active { grid-template-columns: 2.5fr 0.25fr 0.25fr; }
        main.act-2-active { grid-template-columns: 0.25fr 2.5fr 0.25fr; }
        main.act-3-active { grid-template-columns: 0.25fr 0.25fr 2.5fr; }

        section.act {
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: transparent;
            transition: all 0.7s ease;
            overflow: hidden;
            border-right: 1px solid rgba(0,0,0,0.1);
            padding: 40px;
        }

        /* NEUTRAL TITLES */
        .act h2 {
            font-family: 'Bodoni Moda', serif;
            font-size: 1.5rem;
            text-transform: uppercase;
            color: #111;
            letter-spacing: 0.2rem;
            transition: all 0.6s ease;
            text-align: center;
            z-index: 50;
        }
        .act h2 .subtitle {
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1rem;
            transition: all 0.6s ease;
            opacity: 0.6;
            display: block;
            margin-top: 10px;
        }

        /* MAXIMALIST ASSET STYLING (LAYERED) */
        .asset {
            position: absolute;
            opacity: 0;
            pointer-events: none;
            transition: all 1.2s cubic-bezier(0.85, 0, 0.15, 1);
        }
        .active .asset { opacity: 1; } 

        /* Layering Fixes */
        .act-content { z-index: 60; pointer-events: none;}

        /* BLUR NEIGHBORS (ESF Rule: Selected Dominates) */
        main.act-1-active .act-2, main.act-1-active .act-3,
        main.act-2-active .act-1, main.act-2-active .act-3,
        main.act-3-active .act-1, main.act-3-active .act-2 {
            filter: blur(20px) grayscale(1) brightness(0.5);
            opacity: 0.2;

        @keyframes jitter { 0% { transform: translate(0, 0); } 25% { transform: translate(2px, -2px); } 50% { transform: translate(-2px, 2px); } 75% { transform: translate(1px, 1px); } 100% { transform: translate(0, 0); } }

            transition: opacity 1s ease;

        .act-1.active .lens-flare { animation: lensFlareReveal 1s forward; opacity: 0.4; }

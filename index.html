<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Through The Feminine Gaze</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..900;1,6..96,400..900&family=Anton&family=Space+Mono&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        /* CINEMATIC OVERLAY */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image: url("https://www.transparenttextures.com/patterns/stardust.png");
            opacity: 0.15;
            z-index: 1000;
            pointer-events: none;
        }

        html, body { 
            width: 100%; height: 100vh; overflow: hidden; 
            background-color: #F5F5DC; 
        }

        main {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            height: 100vh;
            width: 100vw;
            transition: grid-template-columns 0.9s cubic-bezier(0.85, 0, 0.15, 1);
        }

        /* GRID EXPANSION */
        main.act-1-active { grid-template-columns: 2.5fr 0.25fr 0.25fr; }
        main.act-2-active { grid-template-columns: 0.25fr 2.5fr 0.25fr; }
        main.act-3-active { grid-template-columns: 0.25fr 0.25fr 2.5fr; }

        section.act {
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #F5F5DC;
            transition: all 0.7s ease;
            overflow: hidden;
            border-right: 1px solid rgba(0,0,0,0.1);
        }

        /* NEUTRAL STATE: Everything is uniform before hover */
        .act h2 {
            font-family: 'Bodoni Moda', serif;
            font-size: 2.5rem;
            text-transform: uppercase;
            color: #222;
            letter-spacing: 0.1rem;
            transition: all 0.5s ease;
            z-index: 100;
        }

        .act p {
            font-family: 'Bodoni Moda', serif;
            font-size: 1rem;
            color: #222;
            opacity: 0.8;
            transition: all 0.5s ease;
            z-index: 100;
        }

        /* MAXIMALIST HINTS (HIDDEN BY DEFAULT) */
        .hint {
            position: absolute;
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
            text-transform: uppercase;
            opacity: 0;
            transition: opacity 0.4s ease;
            pointer-events: none;
        }

        /* ============= ACT I: SOFT FOCUS (Marie Antoinette / Virgin Suicides) ============= */
        .act-1.active { background-color: #C3D7E8; }
        .act-1.active h2 { 
            font-family: 'Bodoni Moda', serif;
            font-weight: 300;
            letter-spacing: 1.5rem; 
            font-style: italic;
        }
        .act-1.active::after {
            content: "LET THEM EAT CAKE";
            position: absolute; bottom: 10%; font-family: 'Bodoni Moda';
            font-size: 0.8rem; letter-spacing: 0.5rem; opacity: 0.4;
        }

        /* ============= ACT II: GLITTER (Spring Breakers / Euphoria) ============= */
        .act-2.active { background-color: #FF007F; color: #001F3F; }
        .act-2.active h2 { 
            font-family: 'Anton', sans-serif; /* Stretched, Bold Sans-serif */
            font-size: 8rem;
            letter-spacing: -0.2rem;
            transform: scaleY(1.3);
            color: #fff;
            text-shadow: 4px 4px 0px #001F3F;
        }
        .act-2.active .hint-glitter {
            opacity: 1; top: 20%; left: 10%; color: #fff; transform: rotate(-15deg);
        }

        /* ============= ACT III: ASPHALT (Florida Project / Little Miss Sunshine) ============= */
        .act-3.active { 
            background-color: #F4A460; 
            /* Cheetah/Floral Hybrid Pattern */
            background-image: radial-gradient(#d0021b 15%, transparent 16%), radial-gradient(#d0021b 15%, transparent 16%);
            background-size: 30px 30px;
            background-position: 0 0, 15px 15px;
            background-blend-mode: overlay;
        }
        .act-3.active h2 { 
            font-family: 'Alfa Slab One', cursive;
            color: #008080; /* Motel Teal */
            font-size: 5rem;
            transform: skew(-5deg);
        }
        .act-3.active .hint-motel {
            opacity: 1; bottom: 15%; right: 10%; font-weight: bold; background: #008080; color: #fff; padding: 5px;
        }

        /* BLUR NEIGHBORS (ESF Rule: Non-selected options recede) */
        main.act-1-active .act-2, main.act-1-active .act-3,
        main.act-2-active .act-1, main.act-2-active .act-3,
        main.act-3-active .act-1, main.act-3-active .act-2 {
            filter: blur(12px);
            opacity: 0.2;
        }

        /* ACTIVE HINTS DISPLAY */
        .active .hint { opacity: 0.8; }

        @media (max-width: 768px) {
            main { grid-template-columns: 1fr; }
            main.act-1-active, main.act-2-active, main.act-3-active { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <main>
        <section class="act act-1">
            <span class="hint" style="top:10%; left:10%;">VERSAILLES 1789</span>
            <span class="hint" style="bottom:20%; right:5%;">Lace & Seclusion</span>
            <div class="act-content">
                <h2>Soft Focus</h2>
                <p>Heavy Hearts</p>
            </div>
        </section>

        <section class="act act-2">
            <span class="hint hint-glitter">SPRING BREAK FOREVER</span>
            <span class="hint" style="bottom:10%; left:20%;">SYNTHETIC DREAMS</span>
            <div class="act-content">
                <h2>Glitter</h2>
                <p>In The Dark</p>
            </div>
        </section>

        <section class="act act-3">
            <span class="hint" style="top:15%; left:5%;">7-ELEVEN / 104 DEGREES</span>
            <span class="hint hint-motel">MAGIC CASTLE MOTEL</span>
            <div class="act-content">
                <h2>Asphalt</h2>
                <p>Diesel Dust</p>
            </div>
        </section>
    </main>

    <script>
        const main = document.querySelector('main');
        const acts = document.querySelectorAll('.act');
        
        acts.forEach((act, index) => {
            act.addEventListener('mouseenter', () => {
                acts.forEach(a => a.classList.remove('active'));
                main.className = `act-${index + 1}-active`;
                act.classList.add('active');
            });
        });

        main.addEventListener('mouseleave', () => {
            acts.forEach(a => a.classList.remove('active'));
            main.className = '';
        });
    </script>
</body>
</html>

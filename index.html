<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Through The Feminine Gaze: A Cinematic Mood Board</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..900;1,6..96,400..900&family=Impact&display=swap" rel="stylesheet">
    
    <style>
        /* ==========================================================================
           GLOBAL ORCHESTRATION & LAYOUT
           ========================================================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100vh;
            overflow: hidden; /* Strict: no scrolling */
            background-color: #F5F5DC; /* Gallery Cream - Default */
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        /* ==========================================================================
           ASYMMETRICAL 3-COLUMN GRID LAYOUT
           Resting State: 1fr 1fr 1fr
           Interaction: Active expands to 2fr, others contract to 0.5fr
           ========================================================================== */
        main.hero-screen {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            height: 100vh;
            width: 100vw;
            /* Cinematic transition: cubic-bezier(0.25, 1, 0.5, 1) for analog feel */
            transition: grid-template-columns 0.5s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* Asymmetrical expansion logic */
        main.hero-screen.act-1-active {
            grid-template-columns: 2fr 0.5fr 0.5fr;
        }

        main.hero-screen.act-2-active {
            grid-template-columns: 0.5fr 2fr 0.5fr;
        }

        main.hero-screen.act-3-active {
            grid-template-columns: 0.5fr 0.5fr 2fr;
        }

        /* ==========================================================================
           TEXTURING & LAYERING STRATEGY
           Pseudo-Element Stack (top to bottom):
           1. Overlay Layer (::after): Grain/Noise/Bloom
           2. Pattern Layer (::before): Movie-specific motifs
           3. Base Layer: Solid hex + linear-gradient depth
           ========================================================================== */
        section.act {
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            cursor: pointer;
            will-change: grid-column, transform;
            transition: background-color 0.5s cubic-bezier(0.25, 1, 0.5, 1),
                        background-blend-mode 0.5s cubic-bezier(0.25, 1, 0.5, 1),
                        filter 0.5s cubic-bezier(0.25, 1, 0.5, 1),
                        transform 0.5s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* Base Layer: Solid color + subtle depth gradient */
        section.act {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.05), rgba(0, 0, 0, 0.08));
        }

        /* Pattern Layer (::before): Movie-specific motifs */
        .act::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s cubic-bezier(0.25, 1, 0.5, 1),
                        filter 0.5s cubic-bezier(0.25, 1, 0.5, 1);
            mix-blend-mode: soft-light; /* Blending mode for texture interaction */
        }

        /* Overlay Layer (::after): Grain/Noise/Bloom */
        .act::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 3;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s cubic-bezier(0.25, 1, 0.5, 1),
                        filter 0.5s cubic-bezier(0.25, 1, 0.5, 1);
            mix-blend-mode: overlay; /* Film grain/noise blending */
        }

        /* Content Container: Text remains sharp and unaffected */
        .act-content {
            position: relative;
            z-index: 4;
            text-align: center;
            max-width: 85%;
            pointer-events: auto;
            filter: none; /* Isolate text from background effects */
        }

        .act-content h2 {
            margin-bottom: 0.5rem;
            transition: text-shadow 0.5s cubic-bezier(0.25, 1, 0.5, 1),
                        color 0.5s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .act-content p {
            font-size: 0.95rem;
            line-height: 1.6;
            opacity: 0.85;
        }

        /* ==========================================================================
           ACT I: MARIE ANTOINETTE / THE VIRGIN SUICIDES
           Visual Spec: Versailles Blue #C3D7E8
           Typography: Bodoni Moda serif, letter-spacing: 1rem
           Pattern: Toile de Jouy lace
           Performance: Bloom filter (brightness 1.1, blur 1.2px)
           ========================================================================== */
        .act-1 {
            background-color: #F5F5DC; /* Cream default */
        }

        .act-1::before {
            /* Pattern Layer: Subtle linen texture (default) */
            background: 
                repeating-linear-gradient(
                    0deg,
                    transparent 0px,
                    transparent 1px,
                    rgba(197, 197, 197, 0.15) 1px,
                    rgba(197, 197, 197, 0.15) 2px
                ),
                repeating-linear-gradient(
                    90deg,
                    transparent 0px,
                    transparent 1px,
                    rgba(197, 197, 197, 0.15) 1px,
                    rgba(197, 197, 197, 0.15) 2px
                );
            opacity: 0.3;
        }

        .act-1 .act-content h2 {
            font-family: 'Bodoni Moda', serif;
            font-size: 3.5rem;
            font-weight: 700;
            letter-spacing: 1rem;
            text-transform: uppercase;
            color: #333; /* High-contrast charcoal */
        }

        .act-1 .act-content p {
            font-family: 'Bodoni Moda', serif;
            font-style: italic;
            color: #666;
        }

        /* Act I Active: Versailles Blue + Toile de Jouy */
        .act-1.active {
            background-color: #C3D7E8; /* Versailles Blue */
        }

        .act-1.active::before {
            /* Toile de Jouy Pattern: Ornate French motifs */
            background: 
                radial-gradient(ellipse 80px 60px at 20% 30%, rgba(255, 255, 255, 0.3) 0%, transparent 60%),
                radial-gradient(ellipse 100px 80px at 75% 70%, rgba(255, 255, 255, 0.25) 0%, transparent 60%),
                repeating-linear-gradient(
                    45deg,
                    transparent 0px,
                    transparent 15px,
                    rgba(255, 255, 255, 0.1) 15px,
                    rgba(255, 255, 255, 0.1) 17px
                );
            opacity: 1;
            filter: brightness(1.1) blur(1.2px); /* Bloom filter: hazy 35mm */
        }

        .act-1.active .act-content h2 {
            color: #1a3a52; /* Deeper blue tone */
        }

        /* ==========================================================================
           ACT II: SPRING BREAKERS / EUPHORIA
           Visual Spec: Acid Pink #FF007F
           Typography: Impact sans-serif, bold, condensed
           Pattern: Glossy checkerboard
           Performance: Chromatic aberration text-shadow + neon glow
           ========================================================================== */
        .act-2 {
            background-color: #F5F5DC; /* Cream default */
        }

        .act-2::before {
            /* Pattern Layer: Muted grey checkerboard (default) */
            background: 
                linear-gradient(45deg, #d3d3d3 25%, transparent 25%, transparent 75%, #d3d3d3 75%, #d3d3d3),
                linear-gradient(45deg, #d3d3d3 25%, transparent 25%, transparent 75%, #d3d3d3 75%, #d3d3d3);
            background-size: 60px 60px;
            background-position: 0 0, 30px 30px;
            opacity: 0.2;
        }

        .act-2 .act-content h2 {
            font-family: 'Impact', sans-serif;
            font-weight: 900;
            font-size: 5rem;
            text-transform: uppercase;
            letter-spacing: -0.02em;
            color: #111;
        }

        .act-2 .act-content p {
            font-family: 'Impact', sans-serif;
            font-weight: bold;
            color: #333;
        }

        /* Act II Active: Acid Pink + Glossy + Chromatic Aberration */
        .act-2.active {
            background-color: #FF007F; /* Acid Pink */
            box-shadow: 0 0 100px rgba(0, 255, 255, 0.5), /* Neon glow */
                        inset 0 0 100px rgba(0, 255, 255, 0.2); /* Inner cyan glow */
        }

        .act-2.active::before {
            /* Glossy checkerboard + Wet-look highlights */
            background: 
                /* Wet-look PVC shine */
                radial-gradient(ellipse at 30% 30%, rgba(255, 255, 255, 0.4) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 70%, rgba(255, 255, 255, 0.2) 0%, transparent 50%),
                /* Electric blue neon grid */
                linear-gradient(0deg, rgba(0, 255, 255, 0.4) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.4) 1px, transparent 1px);
            background-size: 100% 100%, 100% 100%, 50px 50px, 50px 50px;
            opacity: 1;
            mix-blend-mode: screen; /* Electric, luminous blend */
        }

        .act-2.active .act-content h2 {
            color: #fff;
            /* Chromatic Aberration: Lens distortion effect */
            text-shadow: -2px 0 #00ffff, 2px 0 #ff0000;
        }

        .act-2.active .act-content p {
            color: #fff;
            text-shadow: -1px 0 #00ffff, 1px 0 #ff0000;
        }

        /* ==========================================================================
           ACT III: THE FLORIDA PROJECT / LITTLE MISS SUNSHINE
           Visual Spec: Sun-Bleached Ochre #F4A460
           Typography: Alfa Slab One retro slab-serif, vintage motel teal #008080
           Pattern: Faded cracked floral linoleum
           Performance: 15% film grain + heat haze skewY animation
           ========================================================================== */
        .act-3 {
            background-color: #F5F5DC; /* Cream default */
        }

        .act-3::before {
            /* Pattern Layer: Faded concrete/sand texture (default) */
            background: 
                radial-gradient(circle at 20% 50%, rgba(150, 150, 150, 0.1) 1px, transparent 1px),
                radial-gradient(circle at 60% 70%, rgba(180, 180, 180, 0.08) 1px, transparent 1px),
                linear-gradient(90deg, transparent 0%, rgba(150, 150, 150, 0.05) 50%, transparent 100%);
            background-size: 60px 60px, 80px 80px, 100% 100%;
            opacity: 0.3;
            mix-blend-mode: multiply;
        }

        .act-3 .act-content h2 {
            font-family: 'Alfa Slab One', serif;
            font-size: 3.2rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #008080; /* Vintage motel teal */
        }

        .act-3 .act-content p {
            font-family: 'Courier New', monospace;
            color: #5a4a2a;
            letter-spacing: 0.05em;
        }

        /* Act III Active: Ochre + Floral Linoleum + Heat Haze */
        .act-3.active {
            background-color: #F4A460; /* Sun-Bleached Ochre */
            animation: heatHaze 3s infinite ease-in-out;
        }

        .act-3.active::before {
            /* Faded cracked floral linoleum pattern */
            background: 
                /* Floral blooms in bleached teal */
                radial-gradient(ellipse at 25% 35%, rgba(0, 128, 128, 0.4) 0%, transparent 50%),
                radial-gradient(ellipse at 75% 65%, rgba(255, 182, 193, 0.35) 0%, transparent 50%),
                /* Cracked linoleum texture */
                repeating-linear-gradient(
                    45deg,
                    transparent 0px,
                    transparent 25px,
                    rgba(0, 0, 0, 0.08) 25px,
                    rgba(0, 0, 0, 0.08) 27px
                ),
                repeating-linear-gradient(
                    -45deg,
                    transparent 0px,
                    transparent 25px,
                    rgba(0, 0, 0, 0.05) 25px,
                    rgba(0, 0, 0, 0.05) 27px
                );
            opacity: 0.3;
            mix-blend-mode: multiply;
        }

        .act-3.active::after {
            /* 15% Film Grain Overlay */
            background: 
                url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='grainAct3'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='2.5' numOctaves='6' result='noise'/%3E%3C/filter%3E%3Crect width='200' height='200' filter='url(%23grainAct3)' opacity='1'/%3E%3C/svg%3E");
            opacity: 0.15;
            mix-blend-mode: overlay;
        }

        .act-3.active .act-content h2 {
            color: #d4a574; /* Faded teal under ochre */
        }

        /* ==========================================================================
           HEAT HAZE ANIMATION
           Continuous skewY between -0.5deg and 0.5deg
           ========================================================================== */
        @keyframes heatHaze {
            0% {
                transform: skewY(-0.5deg);
            }
            50% {
                transform: skewY(0deg);
            }
            100% {
                transform: skewY(0.5deg);
            }
        }

        /* ==========================================================================
           RESPONSIVE DESIGN
           ========================================================================== */
        @media (max-width: 1024px) {
            .act-1 .act-content h2 { 
                font-size: 3rem; 
                letter-spacing: 0.7rem;
            }
            .act-2 .act-content h2 { font-size: 4rem; }
            .act-3 .act-content h2 { font-size: 2.5rem; }
        }

        @media (max-width: 768px) {
            main.hero-screen {
                grid-template-columns: 1fr;
            }
            
            main.hero-screen.act-1-active,
            main.hero-screen.act-2-active,
            main.hero-screen.act-3-active {
                grid-template-columns: 1fr;
            }

            .act-1 .act-content h2 { 
                font-size: 2.5rem; 
                letter-spacing: 0.5rem;
            }
            .act-2 .act-content h2 { font-size: 3rem; }
            .act-3 .act-content h2 { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <main class="hero-screen">
        <!-- ACT I: Marie Antoinette / The Virgin Suicides -->
        <section class="act act-1">
            <div class="act-content">
                <h2>Act I</h2>
                <p>Marie Antoinette</p>
            </div>
        </section>

        <!-- ACT II: Spring Breakers / Euphoria -->
        <section class="act act-2">
            <div class="act-content">
                <h2>Act II</h2>
                <p>Spring Breakers</p>
            </div>
        </section>

        <!-- ACT III: The Florida Project / Little Miss Sunshine -->
        <section class="act act-3">
            <div class="act-content">
                <h2>Act III</h2>
                <p>The Florida Project</p>
            </div>
        </section>
    </main>

    <script>
        const heroScreen = document.querySelector('.hero-screen');
        const acts = document.querySelectorAll('.act');

        // Hover interaction: Expand active column, contract others
        acts.forEach((act, index) => {
            act.addEventListener('mouseenter', () => {
                // Remove all active classes
                acts.forEach(a => a.classList.remove('active'));
                heroScreen.classList.remove('act-1-active', 'act-2-active', 'act-3-active');

                // Add active class to hovered act
                act.classList.add('active');
                heroScreen.classList.add(`act-${index + 1}-active`);
            });
        });

        // Reset on mouse leave
        heroScreen.addEventListener('mouseleave', () => {
            acts.forEach(a => a.classList.remove('active'));
            heroScreen.classList.remove('act-1-active', 'act-2-active', 'act-3-active');
        });
    </script>
</body>
</html>

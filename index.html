<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hero Faction: The Vision</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..900;1,6..96,400..900&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        /* THE FILM GRAIN (Global) */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image: url("https://www.transparenttextures.com/patterns/stardust.png");
            opacity: 0.15;
            z-index: 100;
            pointer-events: none;
            animation: grainFlicker 8s steps(10) infinite;
        }

        @keyframes grainFlicker {
            0%, 100% { transform: translate(0, 0); }
            10% { transform: translate(-1%, -1%); }
            30% { transform: translate(1%, 1%); }
            50% { transform: translate(-0.5%, 0.5%); }
        }

        html, body { width: 100%; height: 100vh; overflow: hidden; background-color: #F5F5DC; }

        main {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            height: 100vh;
            width: 100vw;
            transition: grid-template-columns 0.8s cubic-bezier(0.77, 0, 0.175, 1);
        }

        /* Expansion Logic */
        main.act-1-active { grid-template-columns: 2.3fr 0.35fr 0.35fr; }
        main.act-2-active { grid-template-columns: 0.35fr 2.3fr 0.35fr; }
        main.act-3-active { grid-template-columns: 0.35fr 0.35fr 2.3fr; }

        section.act {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #F5F5DC;
            transition: background-color 0.6s ease;
            overflow: hidden;
        }

        .act-content { position: relative; z-index: 20; text-align: center; transition: transform 0.6s ease; }

        section.act h2 {
            font-family: 'Bodoni Moda', serif;
            font-size: clamp(2rem, 6vw, 4rem);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1rem;
            color: #222;
            transition: all 0.7s ease;
        }

        section.act p {
            font-family: 'Bodoni Moda', serif;
            font-size: 1.2rem;
            font-style: italic;
            color: #666;
            margin-top: 10px;
            transition: all 0.7s ease;
            opacity: 0.6;
        }

        /* ============= ACT I: SOFT FOCUS / HEAVY HEARTS ============= */
        .act-1.active { background-color: #EBF5FB; }
        .act-1.active h2 { letter-spacing: 1.2rem; color: #5D6D7E; }
        .act-1.active p { opacity: 1; transform: translateY(5px); }
        
        /* Floating Lace Texture */
        .act-1::after {
            content: ''; position: absolute; inset: -50%; z-index: 5; opacity: 0;
            background-image: url("https://www.transparenttextures.com/patterns/shattered-island.png");
            transition: opacity 0.8s ease;
            pointer-events: none;
        }
        .act-1.active::after { opacity: 0.3; animation: drift 20s linear infinite; }

        /* ============= ACT II: GLITTER IN THE DARK ============= */
        .act-2.active { background-color: #0A0206; }
        .act-2.active h2 { 
            color: #fff;

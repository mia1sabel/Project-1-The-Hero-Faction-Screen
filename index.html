<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Through The Feminine Gaze: A Cinematic Mood Board</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..900;1,6..96,400..900&display=swap" rel="stylesheet">
    <style>
        /* ==========================================================================
           GLOBAL INTERFACE RULES
           ========================================================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            height: 100vh;
            overflow: hidden; /* Prevents scrolling as requested */
            background-color: #F5F5DC; /* Gallery Cream default */
            font-family: sans-serif;
            transition: background-color 0.4s ease-in-out;
        }

        /* The Grid Layout */
        .poster-container {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            height: 100vh;
            width: 100vw;
            transition: grid-template-columns 0.4s ease-in-out;
        }

        /* Common Act Styling */
        .act {
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            text-align: center;
            overflow: hidden;
            transition: background-color 0.4s ease-in-out, box-shadow 0.4s ease-in-out;
            cursor: pointer;
        }

        /* Common pseudo-element setup for isolated background/texture layers */
        .act::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            z-index: 1;
            transition: opacity 0.4s ease-in-out, filter 0.4s ease-in-out;
        }

        /* Ensuring text stays above the pseudo-element textures */
        .act-content {
            position: relative;
            z-index: 2;
            pointer-events: none; /* Helps maintain smooth hover states */
        }

        /* ==========================================================================
           ACT I: SOFT FOCUS, HEAVY HEARTS
           ========================================================================== */
        .act-1 {
            background-color: #EFEFE5; /* Neutral variant of cream */
        }

        .act-1 .act-content h1 {
            font-family: "Bodoni Moda", serif;
            font-size: 3.5rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: #2c2c2c;
            transition: transform 0.4s ease-in-out;
        }

        /* Act I Texture: Mimicking a faint Toile/lace overlay */
        .act-1::after {
            background-color: #C3D7E8; /* Versailles Blue */
            background-image: repeating-linear-gradient(45deg, rgba(255,255,255,0.1) 0px, rgba(255,255,255,0.1) 2px, transparent 2px, transparent 10px);
        }

        /* Act I Hover Performance */
        .act-1.active {
            background-color: #C3D7E8;
        }

        .act-1.active::after {
            opacity: 1;
            filter: brightness(1.1) blur(0.8px); /* Bloom Filter isolation */
        }

        /* ==========================================================================
           ACT II: GLITTER IN THE DARK
           ========================================================================== */
        .act-2 {
            background-color: #EAEAD5; 
        }

        .act-2 .act-content h1 {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-weight: 900;
            font-stretch: condensed;
            font-size: 5rem;
            text-transform: uppercase;
            color: #111;
            transition: text-shadow 0.4s ease-in-out, color 0.4s ease-in-out;
        }

        /* Act II Texture: Glossy Checkerboard with a liquid look */
        .act-2::after {
            background-color: #FF007F; /* Acid Pink */
            background-image: linear-gradient(45deg, #1a0030 25%, transparent 25%, transparent 75%, #1a0030 75%, #1a0030), 
                              linear-gradient(45deg, #1a0030 25%, transparent 25%, transparent 75%, #1a0030 75%, #1a0030);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            opacity: 0;
        }

        /* Act II Hover Performance */
        .act-2.active {
            background-color: #FF007F;
            box-shadow: inset 0 0 100px #00ffff, 0 0 50px #ff007f; /* Neon Glow */
        }

        .act-2.active::after {
            opacity: 0.15; /* Subdued so text remains legible */
        }

        .act-2.active .act-content h1 {
            color: #fff;
            /* Chromatic Aberration RGB split */
            text-shadow: -3px 0 #00ffff, 3px 0 #ff0000;
        }

        /* ==========================================================================
           ACT III: ASPHALT SHIMMER, DIESEL DUST
           ========================================================================== */
        .act-3 {
            background-color: #DFDFCC;
        }

        .act-3 .act-content h1 {
            font-family: 'Alfa Slab One', serif;
            font-size: 3rem;
            text-transform: uppercase;
            color: #3d2612;
            transition: transform 0.4s ease-in-out;
        }

        /* Act III Texture: Faded film grain */
        .act-3::after {
            background-color: #F4A460; /* Sun-Bleached Ochre */
            /* CSS film grain simulation */
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%' height='100%' filter='url(%23noise)'/%3E%3C/svg%3E");
            opacity: 0;
        }

        /* Act III Hover Performance */
        .act-3.active {
            background-color: #F4A460;
            animation: heatHaze 0.3s infinite alternate ease-in-out;
        }

        .act-3.active::after {
            opacity: 0.25; /* 15-25% grain overlay */
        }

        /* Heat Haze Animation */
        @keyframes heatHaze {
            0% { transform: skewY(0.5deg); }
            100% { transform: skewY(-0.5deg); }
        }
    </style>
</head>
<body>

    <div class="poster-container" id="gridContainer">
        
        <div class="act act-1" onmouseenter="setGrid('2fr 0.5fr 0.5fr', 1)" onmouseleave="resetGrid()">
            <div class="act-content">
                <h1>Act I<br>Soft Focus</h1>
            </div>
        </div>

        <div class="act act-2" onmouseenter="setGrid('0.5fr 2fr 0.5fr', 2)" onmouseleave="resetGrid()">
            <div class="act-content">
                <h1>Act II<br>Glitter</h1>
            </div>
        </div>

        <div class="act act-3" onmouseenter="setGrid('0.5fr 0.5fr 2fr', 3)" onmouseleave="resetGrid()">
            <div class="act-content">
                <h1>Act III<br>Asphalt</h1>
            </div>
        </div>

    </div>

    <script>
        const container = document.getElementById('gridContainer');
        const acts = document.querySelectorAll('.act');

        function setGrid(gridSpec, activeIndex) {
            container.style.gridTemplateColumns = gridSpec;
            
            // Remove active state from all, apply only to the hovered act
            acts.forEach((act, index) => {
                if (index === activeIndex - 1) {
                    act.classList.add('active');
                } else {
                    act.classList.remove('active');
                }
            });
        }

        function resetGrid() {
            container.style.gridTemplateColumns = '1fr 1fr 1fr';
            acts.forEach(act => act.classList.remove('active'));
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Through The Feminine Gaze: The Hero Faction</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..900;1,6..96,400..900&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100vh; overflow: hidden; background-color: #FFF5F7; }

        main {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            height: 100vh;
            width: 100vw;
            transition: grid-template-columns 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        main.act-1-active { grid-template-columns: 2.2fr 0.4fr 0.4fr; }
        main.act-2-active { grid-template-columns: 0.4fr 2.2fr 0.4fr; }
        main.act-3-active { grid-template-columns: 0.4fr 0.4fr 2.2fr; }

        section.act {
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            cursor: pointer;
        }

        .act-content {
            position: relative;
            z-index: 20;
            text-align: center;
            max-width: 85%;
        }

        /* ============= ACT I: SOFT FOCUS ============= */
        .act-1 { background-color: #FFF5F7; transition: background-color 0.5s ease; }
        .act-1 .act-content h2 {
            font-family: 'Bodoni Moda', serif;
            font-size: clamp(2rem, 8vw, 4rem);
            letter-spacing: 0.8rem;
            text-transform: uppercase;
            color: #5D6D7E;
        }
        .act-1 .act-content p { font-family: 'Bodoni Moda', serif; font-style: italic; color: #AAB7B8; }
        .act-1::after {
            content: ''; position: absolute; inset: 0; z-index: 5; opacity: 0; transition: opacity 0.5s ease;
            mix-blend-mode: overlay; 
            background-image: 
                radial-gradient(circle, #FFB6C1 15%, transparent 16%),
                repeating-linear-gradient(45deg, rgba(255, 255, 255, 0.4) 0px, rgba(255, 255, 255, 0.4) 1px, transparent 1px, transparent 10px),
                linear-gradient(90deg, rgba(173, 216, 230, 0.3) 10%, transparent 10%);
            background-size: 80px 80px, 20px 20px, 60px 100%;
        }
        .act-1.active { background-color: #EBF5FB; }
        .act-1.active::after { opacity: 1; }

        /* ============= ACT II: GLITTER IN THE DARK (Spring Breakers/Euphoria) ============= */
        .act-2 {
            background-color: #F8F8EC; 
            transition: background-color 0.4s ease;
        }

        .act-2 .act-content h2 {
            font-family: 'Bodoni Moda', serif;
            font-weight: 900;
            font-size: clamp(3rem, 10vw, 6.5rem);
            text-transform: uppercase;
            letter-spacing: -0.2rem; /* Tight letter spacing for that movie poster look */
            color: #111;
            transition: all 0.4s ease;
        }

        .act-2 .act-content p {
            font-family: 'Courier New', monospace;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5rem;
            color: #444;
            margin-top: -10px;
        }

        /* Layer 1: The "Dirty" Light Leak */
        .act-2::before {
            content: ''; position: absolute; inset: 0; z-index: 2; opacity: 0; transition: opacity 0.5s;
            background: 
                radial-gradient(circle at 20% 30%, rgba(0, 255, 255, 0.3), transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(255, 0, 127, 0.3), transparent 50%),
                radial-gradient(circle at 50% 50%, transparent, rgba(0,0,0,0.8)); /* Vignette */
            pointer-events: none;
        }

        /* Layer 2: Chaotic Glitter Overlay */
        .act-2::after {
            content: ''; position: absolute; inset: 0; z-index: 3; opacity: 0; transition: opacity 0.5s;
            mix-blend-mode: color-dodge;
            background-image: 
                radial-gradient(circle at 10% 10%, #fff 1px, transparent 1px),
                radial-gradient(circle at 20% 50%, #00FFFF 2px, transparent 2px),
                radial-gradient(circle at 70% 30%, #FF00FF 2px, transparent 2px),
                radial-gradient(circle at 40% 80%, #fff 1px, transparent 1px),
                repeating-linear-gradient(0deg, rgba(255,255,255,0.03) 0px, rgba(255,255,255,0.03) 1px, transparent 1px, transparent 4px); /* Scanlines */
            background-size: 100px 100px, 150px 150px, 200px 200px, 80px 80px, 100% 4px;
            pointer-events: none;
        }

        .act-2.active {
            background-color: #0F0208; /* Deep black/purple base */
        }

        .act-2.active::before, .act-2.active::after { opacity: 1; }

        .act-2.active .act-content h2 {
            color: #FFF;
            /* Multi-layered glow: Cyan and Magenta */
            text-shadow: 
                0 0 10px #00FFFF,
                0 0 20px #00FFFF,
                -5px 0 30px #FF00FF,
                5px 0 30px #FF00FF;
            filter: italic;
        }

        .act-2.active .act-content p {
            color: #FF00FF;
            text-shadow: 0 0 5px #FF00FF;
        }

        /* ============= ACT III: ASPHALT SHIMMER ============= */
        .act-3 { background-color: #FBFCFC; transition: background-color 0.4s ease; }
        .act-3 .act-content h2 { font-family: 'Alfa Slab One', serif; font-size: 3.2rem; color: #0E6251; }
        .act-3.active { background-color: #D35400; }
        .act-3.active .act-content h2 { color: #FAD7A0; }

        @media (max-width: 768px) {
            main { grid-template-columns: 1fr; }
            main.act-1-active, main.act-2-active, main.act-3-active { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <main>
        <section class="act act-1">
            <div class="act-content">
                <h2>Act I</h2>
                <p>Soft Focus</p>
            </div>
        </section>
        <section class="act act-2">
            <div class="act-content">
                <h2>Act II</h2>
                <p>Glitter in the Dark</p>
            </div>
        </section>
        <section class="act act-3">
            <div class="act-content">
                <h2>Act III</h2>
                <p>Asphalt Shimmer</p>
            </div>
        </section>
    </main>

    <script>
        const main = document.querySelector('main');
        const acts = document.querySelectorAll('.act');
        
        acts.forEach((act, index) => {
            act.addEventListener('mouseenter', () => {
                acts.forEach(a => a.classList.remove('active'));
                main.classList.remove('act-1-active', 'act-2-active', 'act-3-active');
                act.classList.add('active');
                main.classList.add(`act-${index + 1}-active`);
            });
        });

        main.addEventListener('mouseleave', () => {
            acts.forEach(a => a.classList.remove('active'));
            main.classList.remove('act-1-active', 'act-2-active', 'act-3-active');
        });
    </script>
</body>
</html>

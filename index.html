<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Through The Feminine Gaze: The Hero Faction</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..900;1,6..96,400..900&family=Impact&display=swap" rel="stylesheet">
    
    <style>
        /* GLOBAL */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100vh; overflow: hidden; background-color: #FFF0F5; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

        main {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            height: 100vh;
            width: 100vw;
            transition: grid-template-columns 0.4s ease-in-out;
        }

        main.act-1-active { grid-template-columns: 2fr 0.5fr 0.5fr; }
        main.act-2-active { grid-template-columns: 0.5fr 2fr 0.5fr; }
        main.act-3-active { grid-template-columns: 0.5fr 0.5fr 2fr; }

        section.act {
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            cursor: pointer;
        }

        .act-content {
            position: relative;
            z-index: 10;
            text-align: center;
            max-width: 85%;
        }

        .act-content h2 {
            margin-bottom: 0.5rem;
            transition: text-shadow 0.4s ease-in-out, color 0.4s ease-in-out, filter 0.4s ease-in-out;
        }

        /* ============= ACT I: SOFT FOCUS (Lace & Pink Vibe) ============= */
        .act-1 {
            background-color: #FFF0F5; /* Pale Lavender Blush */
            transition: background-color 0.4s ease-in-out;
        }

        .act-1 .act-content h2 {
            font-family: 'Bodoni Moda', serif;
            font-size: 3.5rem;
            font-weight: 700;
            letter-spacing: 1.2rem;
            text-transform: uppercase;
            color: #4A5A6A; 
        }

        .act-1 .act-content p {
            font-family: 'Bodoni Moda', serif;
            font-style: italic;
            color: #8C7C8C;
        }

        /* LAYER: Patchwork Textures (Lace, Stripes, Roses) */
        .act-1::after {
            content: '';
            position: absolute;
            inset: 0;
            z-index: 2;
            opacity: 0;
            transition: opacity 0.4s ease-in-out;
            pointer-events: none;
            mix-blend-mode: multiply; 
            
            background-image: 
                /* 1. Rose Circular Motifs */
                radial-gradient(circle, rgba(255, 100, 180, 0.4) 12%, transparent 13%),
                /* 2. White Diagonal Lace Pattern */
                repeating-linear-gradient(45deg, rgba(255, 255, 255, 0.8) 0px, rgba(255, 255, 255, 0.8) 2px, transparent 2px, transparent 15px),
                /* 3. Blue Toile Vertical Stripes */
                linear-gradient(90deg, rgba(176, 224, 230, 0.5) 20%, transparent 20%),
                /* 4. Fine Grain Texture */
                repeating-linear-gradient(-45deg, rgba(0, 0, 0, 0.02) 0px, rgba(0, 0, 0, 0.02) 1px, transparent 1px, transparent 6px);
            
            background-size: 70px 70px, 30px 30px, 45px 100%, 12px 12px;
        }

        .act-1.active {
            background-color: #B0E0E6; /* Shifts to Powder Blue */
        }

        .act-1.active::after {
            opacity: 0.8; /* Reveals the textures clearly */
        }

        .act-1.active .act-content h2 {
            color: #2E3E4E;
            text-shadow: 2px 2px 10px rgba(255, 255, 255, 0.8);
        }

        /* ============= ACT II: GLITTER IN THE DARK ============= */
        .act-2 {
            background-color: #F5F5DC;
            transition: background-color 0.4s ease-in-out;
        }

        .act-2 .act-content h2 {
            font-family: 'Impact', sans-serif;
            font-weight: 900;
            font-size: 5rem;
            text-transform: uppercase;
            color: #111;
        }

        .act-2 .act-content p {
            font-family: 'Impact', sans-serif;
            font-weight: bold;
            color: #333;
        }

        .act-2::after {
            content: '';
            position: absolute;
            inset: 0;
            z-index: 2;
            opacity: 0;
            transition: opacity 0.4s ease-in-out;
            mix-blend-mode: screen;
            pointer-events: none;
            background: 
                radial-gradient(circle, transparent 3%, #00FF00 3%, #00FF00 6%, transparent 6%, transparent 10%, #FF1493 10%, #FF1493 13%, transparent 13%),
                radial-gradient(ellipse 70px 50px at 20% 30%, rgba(0, 255, 255, 0.6) 0%, transparent 60%),
                radial-gradient(circle at 50% 50%, transparent 6%, #FF00FF 6%, #FF00FF 10%, transparent 10%, transparent 18%, #00FFFF 18%, #00FFFF 22%, transparent 22%);
            background-size: 50%

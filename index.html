<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Through The Feminine Gaze: A Cinematic Mood Board</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..900;1,6..96,400..900&family=Anton&family=Space+Mono&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100vh; overflow: hidden; background-color: #F5F5DC; }

        /* Film Grain & Letterbox */
        body::before {
            content: ""; position: fixed; inset: 0;
            background-image: url("https://www.transparenttextures.com/patterns/stardust.png");
            opacity: 0.3; z-index: 1000; pointer-events: none; mix-blend-mode: multiply;
        }
        .letterbox {
            position: fixed; left: 0; right: 0; height: 8vh;
            background-color: #050505; z-index: 1050;
            transition: height 0.8s cubic-bezier(0.85, 0, 0.15, 1);
        }
        .letterbox.top { top: 0; }
        .letterbox.bottom { bottom: 0; }

        header {
            position: fixed; top: 25px; left: 25px; z-index: 1100;
            font-family: 'Bodoni Moda', serif; font-size: 0.8rem;
            text-transform: uppercase; letter-spacing: 0.4rem; color: #666;
        }

        main {
            display: grid; grid-template-columns: 1fr 1fr 1fr;
            height: 100vh; width: 100vw;
            transition: grid-template-columns 0.9s cubic-bezier(0.85, 0, 0.15, 1);
        }

        /* Act Interactions */
        main.act-1-active { grid-template-columns: 2.5fr 0.25fr 0.25fr; }
        main.act-2-active { grid-template-columns: 0.25fr 2.5fr 0.25fr; }
        main.act-3-active { grid-template-columns: 0.25fr 0.25fr 2.5fr; }

        section.act {
            position: relative; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            overflow: hidden; border-right: 1px solid rgba(0,0,0,0.1);
        }

        .act h2 {
            font-family: 'Bodoni Moda', serif; font-size: 1.5rem;
            text-transform: uppercase; z-index: 50; transition: 0.6s;
        }

        .floating-asset {
            position: absolute; opacity: 0; pointer-events: none;
            transition: opacity 0.5s ease-in-out, transform 0.8s ease;
            z-index: 10;
        }
        .active .floating-asset { opacity: 1; }

        /* Act I: Soft Focus */
        .act-1.active { background-color: #f2e9e4; }
        .act-1 .asset-1 { top: 10%; left: 10%; width: 15%; } /* ribbon */
        .act-1 .asset-2 { bottom: 10%; right: 10%; width: 30%; } /* lace */
        .act-1 .asset-3 { top: 15%; right: 15%; width: 20%; } /* pearls */
        .act-1 .asset-4 { bottom: 20%; left: 15%; width: 18%; } /* flower1.jpg */
        .act-1 .asset-5 { top: 40%; left: 5%; width: 15%; } /* flower2.jpg */
        .act-1 .asset-6 { top: 5%; left: 35%; width: 20%; } /* letter1 */
        .act-1 .asset-7 { bottom: 5%; right: 35%; width: 20%; } /* letter2 */

        /* Act II: Glitter */
        .act-2.active { background-color: #D6006D; }
        .act-2 .asset-1 { top: 10%; left: 5%; width: 12%; } /* candy1 */
        .act-2 .asset-2 { top: 20%; right: 5%; width: 15%; } /* candy2 */
        .act-2 .asset-3 { bottom: 15%; left: 10%; width: 20%; } /* gun */
        .act-2 .asset-4 { bottom: 10%; right: 10%; width: 18%; } /* kiss */
        .act-2 .asset-5 { top: 5%; left: 30%; width: 12%; } /* pills */
        .act-2 .asset-6 { bottom: 20%; left: 5%; width: 30%; mix-blend-mode: screen; } /* shards.jpg */
        .act-2 .asset-7 { top: 30%; right: 5%; width: 30%; mix-blend-mode: screen; } /* sparkles.jpg */

        /* Act III: Asphalt */
        .act-3.active { background-color: #d4a373; }
        .act-3 .asset-1 { top: 10%; right: 10%; width: 25%; } /* motel.jpg */
        .act-3 .asset-2 { bottom: 10%; left: 10%; width: 22%; } /* polaroid.jpg */
        .act-3 .asset-3 { top: 20%; left: 10%; width: 15%; } /* icecream */
        .act-3 .asset-4 { bottom: 20%; right: 15%; width: 18%; } /* Dandelion */
        .act-3 .asset-5 { top: 5%; left: 35%; width: 20%; } /* receipt.jpg */
        .act-3 .asset-6 { bottom: 5%; right: 40%; width: 15%; } /* sticker */
    </style>
</head>
<body>
    <div class="letterbox top"></div>
    <div class="letterbox bottom"></div>
    <header><h1>Through The Feminine Gaze: A Cinematic Mood Board</h1></header>

    <main id="main-grid">
        <section class="act act-1">
            <img src="ribbon.png" class="floating-asset asset-1">
            <img src="lace.png" class="floating-asset asset-2">
            <img src="pearls.png" class="floating-asset asset-3">
            <img src="flower1.jpg" class="floating-asset asset-4">
            <img src="flower2.jpg" class="floating-asset asset-5">
            <img src="letter1.png" class="floating-asset asset-6">
            <img src="letter2.png" class="floating-asset asset-7">
            <h2>Act I: Soft Focus</h2>
        </section>

        <section class="act act-2">
            <img src="candy1.webp" class="floating-asset asset-1">
            <img src="candy2.png" class="floating-asset asset-2">
            <img src="gun.png" class="floating-asset asset-3">
            <img src="kiss.png" class="floating-asset asset-4">
            <img src="pills.webp" class="floating-asset asset-5">
            <img src="shards.jpg" class="floating-asset asset-6">
            <img src="sparkles.jpg" class="floating-asset asset-7">
            <h2>Act II: Glitter</h2>
        </section>

        <section class="act act-3">
            <img src="motel.jpg" class="floating-asset asset-1">
            <img src="polaroid.jpg" class="floating-asset asset-2">
            <img src="icecream.png" class="floating-asset asset-3">
            <img src="Dandelion.png" class="floating-asset asset-4">
            <img src="receipt.jpg" class="floating-asset asset-5">
            <img src="sticker.webp" class="floating-asset asset-6">
            <h2>Act III: Asphalt</h2>
        </section>
    </main>

    <script>
        const main = document.getElementById('main-grid');
        const acts = document.querySelectorAll('.act');
        
        acts.forEach((act, index) => {
            act.addEventListener('mouseenter', () => {
                acts.forEach(a => a.classList.remove('active'));
                main.className = `act-${index + 1}-active`;
                act.classList.add('active');
            });
        });

        main.addEventListener('mouseleave', () => {
            acts.forEach(a => a.classList.remove('active'));
            main.className = '';
        });
    </script>
</body>
</html>
